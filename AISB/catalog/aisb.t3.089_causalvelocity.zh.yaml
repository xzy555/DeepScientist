schema_version: 1
id: aisb.t3.089_causalvelocity
name: 使用因果速度模型区分原因和结果
version: 0.1.0
one_line: 通过基于速度的结构因果模型和基于分数的拟合优度测试进行双变量因果发现，超出了加性噪声和位置尺度模型类别。
task_description: 该打包基准使用基于速度的结构因果模型 (SCM) 评估因果方向推断。该方法将原因变量视为动态系统中的时间，其中因果速度通过初始值问题隐式定义反事实曲线。使用测量传输工具从得分函数中恢复速度函数，从而无需显式函数模型估计或噪声分布假设即可实现无模拟估计。该任务在 ANM 和 LSNM 模型失败的情况下提高了基准级因果发现的准确性，需要对边际分布和联合分布进行非参数分数估计。
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
