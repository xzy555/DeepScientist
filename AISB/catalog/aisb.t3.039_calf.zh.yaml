  size_bytes: 3132751
display:
  palette_seed: teal-amber-signal
  art_style: forecasting-lab
  accent_priority: high
  tags:
  - large_language_models
  - cross_modal_learning
  - time_series_forecasting
  - multivariate_forecasting
  - llm_finetuning
