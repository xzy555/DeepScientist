schema_version: 1
id: aisb.t3.032_ptsolver
name: 'Personal Travel Solver: A Preference-Driven LLM-Solver System for Travel Planning'
version: 0.1.0
one_line: Package the RealTravel data foundation used by preference-aware travel planning systems.
task_description: This packaged benchmark is a data foundation package for preference-aware travel planning
  rather than a fully bundled planner implementation. The task context revolves around user-profile extraction,
  point-of-interest summaries, and structured travel data preparation that would feed a downstream travel-planning
  system.
capability_tags:
- research_code_optimization
- travel_planning
- llm_tooling
- constraint_solving
- personalization
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: low
time_band: 1-2h
difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a planning task that mixes symbolic constraints, user
  preferences, and travel databases without heavyweight GPU training.
not_recommended_when: Do not use this if you need a benchmark focused on large-scale model finetuning
  or multimodal data.
