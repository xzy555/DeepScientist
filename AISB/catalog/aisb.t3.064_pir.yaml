    note: ETT benchmark from Time-Series-Library
  - name: Weather
    url: https://github.com/thuml/Time-Series-Library
    note: Weather forecasting dataset
  - name: Electricity
    url: https://github.com/thuml/Time-Series-Library
    note: UCI electricity consumption dataset
  - name: Traffic
    url: https://github.com/thuml/Time-Series-Library
    note: PEMS-BAY traffic dataset
  notes:
  - Datasets managed via data_provider/data_factory.py and data_loader.py
  - Data loading follows Time-Series-Library conventions
credential_requirements:
  mode: none
  items: []
  notes: []
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 80
    gpu_count: 1
    gpu_vram_gb: 12
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 150
    gpu_count: 1
    gpu_vram_gb: 24
environment:
  python: '3.8'
  cuda: '11.0'
  pytorch: 1.12.0
  flash_attn: null
  key_packages:
  - name: torch
    min_version: 1.12.0
  - name: numpy
    note: For array operations and metrics computation
  - name: pandas
    note: For time series data handling
  notes:
  - Built on Time-Series-Library (thuml/Time-Series-Library)
  - See bundled README/requirements for full dependency set
  - Models implemented in models/ directory (models/PIR.py, models/PatchTST.py, etc.)
  - Core execution via run.py with exp/exp_long_term_forecasting_pir.py
  - Metrics computed in utils/metrics.py (MSE, MAE, RMSE, MAPE, MSPE)
risk_flags:
- long_tail_patterns
- distribution_shift
- instance_variation
risk_notes:
- Instance-level variations arise from distribution shifts, missing data, and long-tail
  patterns
- Global revision relies on retrieval quality from historical context
- Weighted integration of original and revised forecasts requires careful tuning per
  backbone
recommended_when: 'Use this benchmark when you want to enhance an existing forecasting
  backbone with post-hoc revision capabilities. Ideal for evaluating model-agnostic
  forecasting improvements, studying instance-level error patterns, or benchmarking
  post-processing strategies on established time series datasets.

  '
not_recommended_when: 'Do not use this benchmark if you need a from-scratch foundation-model
  training task, require a forecasting task without backbones to enhance, or seek
  methods that operate within the forward pass rather than as post-processing.

  '
