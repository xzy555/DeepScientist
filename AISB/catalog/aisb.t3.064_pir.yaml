id: aisb.t3.064_pir
name: Improving Time Series Forecasting via Instance-aware Post-hoc Revision
version: 0.1.0
one_line: Model-agnostic post-hoc revision framework that identifies and repairs biased
  time series forecast instances through local and global context-guided revision.
task_description: 'This packaged benchmark covers PIR (Post-forecasting Identification
  and Revision), a model-agnostic framework designed to enhance time series forecasting
  by addressing instance-level variations that mainstream models overlook. The framework
  operates in two stages: (1) Failure Identification, which estimates per-instance
  forecasting accuracy to detect potentially biased outputs, and (2) Forecast Revision,
  which refines identified failures using contextual information from both local and
  global perspectives. Local revision leverages immediate covariate forecasts and
  exogenous information within a sliding window; global revision employs retrieval-based
  strategies to capture long-tail patterns from historical data. The revised forecasts
  integrate with original outputs via weighted summation, making PIR compatible with
  arbitrary forecasting backbones including PatchTST, iTransformer, SparseTSF, and
  TimeMixer. Experiments cover long-term and short-term forecasting settings on established
  real-world datasets (ETTh1, ETTm1, Weather, Electricity, Traffic).

  '
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: advanced
time_band: 6-24h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- mse
- mae
- revision_outputs
- forecast_report
launch_profiles:
- id: quick_eval
  label: Quick Eval
  description: Run one packaged PIR-enhanced forecasting evaluation route on a single
    backbone and dataset combination.
- id: full_revision_eval
  label: Full Revision Eval
  description: Run the full packaged post-hoc revision workflow across all supported
    forecasting backbones and datasets.
