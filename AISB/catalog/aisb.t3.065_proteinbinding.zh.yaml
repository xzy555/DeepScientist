  - Karsten Householder
  - Fang Wu
  - Sebastian Thrun
  - K. Christopher Garcia
  - Brian Trippe
  affiliation: Stanford University
  venue: Proceedings of the 42nd International Conference on Machine Learning (ICML
    2025)
  year: 2025
  url: https://arxiv.org/abs/2507.05502
