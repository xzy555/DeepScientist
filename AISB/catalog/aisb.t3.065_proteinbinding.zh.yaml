  notes: |
    最初作为 arXiv 预印本（2507.05502）发布，并被 ICML 2025（PMLR 267）接收。介绍了 StaB-ddG 作为首个在 SKEMPI 上匹配 FoldX 精度的深度学习预测器，同时比基于 Rosetta 的 Flex ddG 提供超过 1000 倍的加速。
