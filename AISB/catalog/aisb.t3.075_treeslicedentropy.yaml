schema_version: 1
id: aisb.t3.075_treeslicedentropy
name: Tree-Sliced Entropy Partial Transport
version: 0.1.0
one_line: Optimize partial transport with tree-sliced entropy for unbalanced distributions and generative
  applications.
task_description: This packaged benchmark covers PartialTSW for unbalanced optimal transport together
  with its experiment families for point clouds, noisy image generation, image-to-image translation, and
  convergence analysis. The task is to choose a concrete experiment family, run the transport objective
  or ablation sweep, and compare convergence quality, runtime, or downstream generative behavior against
  alternative solvers. The local staged metrics are anchored to convergence bias, runtime, and stability
  outputs rather than the optimizer-only internal accuracy target.
capability_tags:
- research_code_optimization
- optimal_transport
- generative_modeling
- probabilistic_geometry
- scientific_ml
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: high
time_band: 2-4d
difficulty: hard
data_access: public
risk_flags:
- route_caveat
- multi_route_experiment_family
risk_notes:
- The packaged repository is structurally complete, but the optimizer target is not one root command;
  point-cloud, image-generation, image-to-image, and analysis routes differ materially.
- The packaged `experiments/image_gen/exp.sh` schedules 72 jobs round-robin across the listed GPUs, so
  a full ablation sweep on one GPU is naturally multi-day.
- Some subroutes can auto-download simple datasets such as MNIST, while others require manual assets or
  pretrained checkpoints before evaluation.
recommended_when: Use this benchmark when you want a geometry-heavy optimal-transport benchmark and are
  prepared to pick one experiment family explicitly.
not_recommended_when: Do not use this if you need a one-command benchmark, a CPU-first route, or a single
  compact dataset with no experiment branching.
