name: Segment-Based Attention Masking for GPTs
version: 0.1.0
one_line: Optimize segment-based attention masking and prompt formatting for instruction-tuned GPT-style
  models.
task_description: This packaged benchmark covers segment-based attention masking and prompt formatting
  for instruction-tuned GPT-style models. The task is to alter masking or segment structure so that instruction-following
  performance improves while the training and inference route remains stable.
