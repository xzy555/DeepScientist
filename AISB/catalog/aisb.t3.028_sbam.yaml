integrity_level: cas_plus_canary
cost_band: medium
time_band: 6-24h
difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a manageable GPT-style task that combines prompt-format
  choices with attention-mask variants.
not_recommended_when: Do not use this if you need a massive full-scale LLM training benchmark or a non-transformer
  task.
