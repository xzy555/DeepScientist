id: aisb.t3.075_treeslicedentropy
name: Tree-Sliced Entropy Partial Transport
version: 0.1.0
one_line: 基于树切片熵的 GPU 加速非平衡部分传输方法，覆盖点云、图像生成与图像到图像转换。
task_description: 该基准覆盖 PartialTSW（部分树切片 Wasserstein），将 Tree-Sliced Wasserstein 扩展到非平衡/部分传输设置，并给出适用于生成建模中动态支撑分布的闭式形式。任务要求选择具体实验族（点云梯度流、JAX/diffusers 图像生成、或图像到图像转换）并运行对应目标或消融。评估聚焦收敛质量（relative_bias_pct）、运行性能（mean_time_s）与稳定性（coefficient_of_variation），而非内部优化器精度目标。代码锚点包括三类可执行脚本：收敛分析、按样本数的运行时基准、按维度的运行时基准。
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: external_eval_required
support_level: recovery
time_band: 2-4d
cost_band: high
difficulty: hard
data_access: public
primary_outputs:
- relative_bias_pct
- mean_time_s
- coefficient_of_variation
launch_profiles:
- id: convergence_eval
  label: Convergence Evaluation
  description: 'Run `analysis/convergence/simple_convergence.py` to assess estimator bias and stability across varying tree counts (L) and lines per tree (k). Uses PyTorch with GPU acceleration. Outputs relative bias percentage and coefficient of variation per configuration.

    '
- id: runtime_n_scaling
  label: Runtime Scaling (Sample Count)
  description: 'Run `analysis/runtime_plot/runtime_plot_compare_n_partial.py` to benchmark runtime and GPU memory across sample sizes N ∈ [10², 10⁵]. Compares PartialTSW against UOT baselines (sopt, spot, pawl, sliced_unbalanced_ot). Includes warm-up runs for stable timing.

    '
- id: runtime_d_scaling
  label: Runtime Scaling (Dimension)
  description: 'Run `analysis/runtime_plot/runtime_plot_compare_d_partial.py` to benchmark runtime and GPU memory across dimensions d ∈ [1, 2048] with fixed N=10⁴. Compares PartialTSW against UOT baselines. Includes warm-up runs for stable timing.

    '
- id: experiment_family
  label: Experiment Family Workflow
  description: 'Select and execute one packaged experiment family: point_cloud (gradient flow), image_gen (JAX/diffusers ablation sweep across multiple GPUs), or img2img (image-to-image translation with class imbalance handling). Each family has distinct data requirements and runtime profiles.

    '
dataset_download:
  primary_method: mixed
  sources:
  - torchvision (auto-download for MNIST-based experiments)
  - manual (pretrained checkpoints for image generation, assets for img2img)
  notes:
  - Convergence and runtime eval scripts use synthetic Gaussian data and require no external datasets.
  - Image generation experiments may auto-download simple datasets through torchvision.
  - Image-to-image translation and some ablation routes require manual asset preparation or pretrained checkpoints before evaluation.
  - Treat dataset setup as experiment-family specific; there is no universal dataset route.
credential_requirements:
  mode: none
  items: []
  notes:
  - No explicit API or dataset credential variables were detected in the shipped source snapshot.
  - Image generation sweep uses explicit GPU slot scheduling (not cloud credential-based).
resources:
  minimum:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 150
    gpu_count: 1
    gpu_vram_gb: 24
    notes: GPU required for meaningful runtime benchmarks; CPU-only execution is impractical for N≥10⁴ or d≥64 configurations.
  recommended:
    cpu_cores: 32
    ram_gb: 128
    disk_gb: 300
    gpu_count: 1
    gpu_vram_gb: 48
    notes: '48 GB VRAM accommodates full dimension sweep (up to d=2048) and larger sample counts. Image generation ablation grid benefits from additional GPU slots if available.

      '
environment:
  python: '3.11'
  cuda: '11.8'
  pytorch: 2.1.0
  flash_attn: null
  key_packages:
  - jax==0.4.23
  - jaxlib==0.4.23
  - transformers==4.51.3
  - diffusers==0.33.1
  - torch>=2.1.0
  - ot (POT library for baseline comparisons)
  - tqdm
  - matplotlib
  - pandas
  - numpy
  notes:
  - The packaged repository mixes PyTorch (analysis scripts), JAX/jaxlib (image generation), and diffusion-style experiment routes rather than one narrow runtime profile.
  - Analysis scripts default to CUDA with `torch.device('cuda' if torch.cuda.is_available() else 'cpu')`.
  - Image generation sweep script (`experiments/image_gen/exp.sh`) schedules 72 jobs round-robin across allocated GPU slots; wall-clock time scales with GPU count.
  - Baseline comparisons in runtime benchmarks import sopt, spot, pawl, sliced_unbalanced_ot, and unbalanced_sliced_ot from the bundled baselines module.
risk_flags:
- route_caveat
- multi_route_experiment_family
- mixed_runtime_environment
- multi_gpu_scheduling_dependent
risk_notes:
- The packaged repository is structurally complete, but the optimizer target is not one root command; point-cloud, image-generation, image-to-image, and analysis routes differ materially in setup and execution.
- The packaged `experiments/image_gen/exp.sh` schedules 72 jobs round-robin across the listed GPUs, so a full ablation sweep on one GPU is naturally multi-day.
- The runtime environment mixes PyTorch (convergence, runtime analysis), JAX/jaxlib (image generation), and diffusion libraries; ensure both CUDA toolchains are compatible.
- Some subroutes can auto-download simple datasets such as MNIST, while others require manual assets or pretrained checkpoints before evaluation.
- Convergence eval uses synthetic Gaussian data only; generative downstream quality must be evaluated separately via experiment family routes.
recommended_when: 当你需要支持非平衡测度的几何最优传输基准、能够明确选择实验族、并具备可支撑多日消融的 GPU 资源时使用本基准。适合比较部分传输求解器在收敛偏差、运行时扩展性和类别不平衡生成任务中的表现。
not_recommended_when: 如果你需要单命令执行、CPU 优先流程、无分支的紧凑数据集，或无需执行即可获得预计算指标，不建议使用本基准。在无 CUDA GPU 的环境下也不适用。
