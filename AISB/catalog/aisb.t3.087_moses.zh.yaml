    cpu_cores: 16
    ram_gb: 64
    disk_gb: 150
    gpu_count: 1
    gpu_vram_gb: 24
    notes: 适合单专家推理和基础分析的最低配置。
  recommended:
    cpu_cores: 32
    ram_gb: 128
    disk_gb: 300
    gpu_count: 2
    gpu_vram_gb: 48
    notes: 推荐用于 LoRA 适配器的多专家培训和批量评估。
environment:
  python: '3.10'
  cuda: '12.1'
  pytorch: 2.6.0
  flash_attn: 2.7.0
  key_packages:
  - torch
  - numpy
  - scipy
  - networkx
  - pyyaml
  notes:
  - 当前本地包不保留可执行安装文件或可运行源代码；这里的环境提示应被视为临时的，直到上游恢复为止。
  - 恢复完成后，请参阅捆绑的自述文件/要求以获取完整的依赖项集。
  - LoRA 实现通常需要 flash_attn 来在训练期间进行有效的注意力计算。
risk_flags:
- source_snapshot_incomplete
- route_caveat
- no_executable_anchor
risk_notes:
- 当前快照不包含可以锚定暂存指标的可执行代码文件；所有主输出（optimality_gap_pct、tour_cost、inference_time）都被阻止执行。
- 本地包仅保留元数据和纸质工件；在执行基准测试之前，需要从上游 GitHub 存储库进行恢复。
- 在此打包过程中未执行任何基准测试。
- 当前快照中缺少顶级自述文件；有关操作细节，请参阅上游文档。
recommended_when: 当您需要纸质规划、MoSES 多级路由管道的上游恢复或状态可分解 MDP 框架和 LoRA 专家组合方法的分析时，请使用此条目。
not_recommended_when: 不要将此本地包视为可立即运行的路由基准；打包的快照不保留可执行的训练管道或评估代码。在未先从上游存储库恢复丢失的组件之前，请勿尝试执行基准测试。
