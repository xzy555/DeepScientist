id: aisb.t3.087_moses
name: MoSES - 多任务车辆路径求解器
version: 0.1.0
one_line: 使用基于 LoRA 的专业专家和状态可分解 MDP 框架下的自适应门控的多任务车辆路径求解器。
task_description: 该打包基准测试涵盖了用于解决多任务车辆路径问题的专业专家混合求解器 (MoSES)。该方法引入了状态可分解 MDP (SDMDP)，通过将状态空间表示为基础状态空间的笛卡尔积来重新表述 VRP，每个基础状态空间都与一个基础 VRP 变体相关联。基础策略是通过专门的 LoRA 专家实现的，每个专家都根据特定基础变体的冻结预训练骨干进行微调。潜在空间扩展（LS-SDMDP）结合了最佳基础策略和可学习的混合函数，以实现嵌入空间中的策略重用。混合函数通过自适应门控机制将最优基础策略生成的基础状态嵌入映射到统一状态嵌入。在温和的假设下，LS-SDMDP 可证明恢复最优统一策略。当前的本地快照保留基准元数据和论文工件，但不包含可执行的训练或评估代码；在执行基准测试之前需要恢复可运行管道。
task_mode: analysis_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: restore_needed
support_level: recovery
time_band: 1d+
cost_band: high
difficulty: hard
data_access: public
primary_outputs:
- optimality_gap_pct
- tour_cost
- inference_time
launch_profiles:
- id: analysis_only
  label: 仅分析
  description: 在不执行管道的情况下查看保留的车辆路线基准元数据、目标输出和指标定义。
- id: restore_first
  label: 首先恢复
  description: 在将该基准测试视为可运行之前，从上游存储库恢复丢失的 MoSES 训练实施、路由执行代码和 LoRA 专家组件。
dataset_download:
  primary_method: mixed
  sources:
