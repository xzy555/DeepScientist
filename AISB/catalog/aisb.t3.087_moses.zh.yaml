    type: upstream_repository
  - url: https://deepscientist.cc/AISB/087_moses
    type: local_archive
  notes:
  - 上游 GitHub 存储库 (panyxy/moses_vrp) 包含官方 MoSES 实现，应作为恢复的主要来源。
  - 当前本地包不保留可执行的基准测试路线；将数据集设置视为上游恢复的一部分，而不是捆绑的运行路径。
  - VRP实例生成和评估数据集需要从上游存储库单独获取。
credential_requirements:
