id: aisb.t3.074_lsvi
name: Least Squares Variational Inference
version: 0.1.0
one_line: Gradient-free variational inference via least-squares updates on tempered
  log-target evaluations, supporting Gaussian BBVI and exponential-family posteriors
  without gradient estimators.
task_description: 'This packaged benchmark implements LSVI (Least Squares Variational
  Inference), a gradient-free, Monte Carlo-based scheme for variational inference
  within exponential families. Instead of gradient-based optimization, LSVI performs
  successive ordinary least squares regression on tempered log-target evaluations
  under the variational approximation. Each iteration solves a fixed-point equation
  via OLS, yielding a bias-corrected stochastic natural gradient descent step. The
  approach avoids unstable gradient estimators required when gradients of log pi are
  unavailable, such as for discrete distributions or likelihood-free inference. The
  benchmark includes Gaussian variational family implementations that eliminate Fisher
  information matrix inversion: O(d) complexity for mean-field Gaussians and O(d^3)
  for full-covariance cases. Primary evaluation uses the Pima Indians diabetes logistic
  regression task, measuring KL divergence to the true posterior via the kl_objective
  metric.

  '
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 2-6h
cost_band: low
difficulty: medium
data_access: public
primary_outputs:
