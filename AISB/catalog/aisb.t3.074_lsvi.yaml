- variational_inference_report
launch_profiles:
- id: gaussian_logreg
  label: Gaussian Logistic Regression
  description: 'Execute the packaged least-squares variational inference experiment
    using Gaussian variational approximation on the Pima Indians diabetes binary classification
    task. Runs 8 random seeds with 8000-step phase-1 and 1500-step phase-2 optimization.
    Outputs KL divergence metrics and variational parameter trajectories.

    '
