  - numpy>=1.21
  - scipy
  notes:
  - JAX is the primary computation library; no PyTorch dependency
  - GPU support is optional via CUDA-enabled jaxlib
  - CPU-only execution is the primary tested configuration
  - See bundled requirements.txt or setup.py for full dependency list
risk_flags: []
risk_notes:
- No external API calls; fully offline benchmark
- CPU-bound execution eliminates GPU availability risk
- Long runtime (up to 6h) but low computational cost
recommended_when: 'Use this benchmark for evaluating probabilistic inference methods
  that must operate without gradient access, including discrete variable models, likelihood-free
  inference, and non-differentiable posteriors. The CPU-friendly execution profile
  makes it suitable for resource-constrained environments or methodological research
  on variational inference.

  '
not_recommended_when: 'Do not use this benchmark for evaluating large-scale deep learning
  methods, GPU-accelerated neural network training, or tasks requiring automatic differentiation
  of the target density. It does not test gradient-based VI alternatives like reparameterization
  tricks or score-function estimators.

  '
