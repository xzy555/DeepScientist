version: 0.1.0
one_line: Optimize unsupervised sentence embeddings with knowledge-guided augmentation and noise-aware
  contrastive learning.
task_description: This packaged benchmark covers unsupervised sentence embeddings trained with knowledge-guided
  augmentation and noise-aware contrastive learning. The task is to improve general-purpose sentence representation
  quality across retrieval or semantic similarity benchmarks while keeping the unsupervised training route
  stable.
