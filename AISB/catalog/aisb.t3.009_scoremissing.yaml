schema_version: 1
id: aisb.t3.009_scoremissing
name: Score Matching with Missing Data
version: 0.1.0
one_line: Optimize missing-data score matching and structured probabilistic estimation across simulated
  and real-world experiments.
task_description: This packaged benchmark covers missing-data score matching for structured probabilistic
  estimation on both simulated and real-world experiments. The task is to model partially observed variables
  with score-based objectives, recover missing values or latent distributions, and improve likelihood-style
  or error-based benchmark metrics under controlled missingness.
capability_tags:
- research_code_optimization
- missing_data
- probabilistic_modeling
- score_matching
- tabular_ml
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: medium
time_band: 6-24h
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want a probabilistic missing-data task with both synthetic
  and real-world evaluation scripts.
not_recommended_when: Do not use this if you need a lightweight single-framework project or a benchmark
  centered on large pretrained foundation models.
paper:
  title: Score Matching with Missing Data
  venue: ICML 2025 Spotlight
  year: 2025
