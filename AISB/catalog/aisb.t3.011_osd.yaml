schema_version: 1
id: aisb.t3.011_osd
name: Orthogonal Subspace Decomposition for Generalizable AI-Generated Image Detection
version: 0.1.0
one_line: Optimize CLIP-based AI-generated image detection across DeepfakeBench and generalized image-forgery
  settings.
task_description: This packaged benchmark covers CLIP-based AI-generated image detection across DeepfakeBench
  and more generalized image-forgery settings. The task is to tune visual detection heads, scoring logic,
  and cross-dataset robustness so that generated-image detection improves without overfitting to one forgery
  family.
capability_tags:
