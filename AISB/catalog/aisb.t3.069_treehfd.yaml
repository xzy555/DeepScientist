id: aisb.t3.069_treehfd
name: Tree Ensemble Explainability through the Hoeffding Functional Decomposition
  and TreeHFD Algorithm
version: 0.1.0
one_line: Decompose XGBoost ensemble predictions into interpretable main effects and
  second-order interactions via the TreeHFD algorithm.
task_description: 'This packaged benchmark evaluates explainability for XGBoost ensembles
  using the Hoeffding functional decomposition (HFD). The TreeHFD algorithm decomposes
  black-box tree-ensemble predictions into a unique sum of lower-dimensional functions—main
  effects (single variables) and second-order interactions (pairs of variables)—that
  are intrinsically transparent while preserving model accuracy. Unlike TreeSHAP,
  the Hoeffding decomposition enforces hierarchical orthogonality, yielding clean
  main-effect estimates where interactions are properly separated. The benchmark measures
  decomposition quality via mean squared error against ground-truth analytical targets
  on a controlled simulation study (p=6 dimensions, n=5000 samples, correlated inputs).

  '
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 1-2h
cost_band: low
difficulty: medium
data_access: public
primary_outputs:
- mse_eta12
- mse_eta1
- mse_eta2
- mse_eta3
- mse_eta4
- mse_eta5
- mse_eta6
- mse_eta34
- mse_others
- functional_decomposition_report
