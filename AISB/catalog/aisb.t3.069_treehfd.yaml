risk_flags: []
risk_notes: []
recommended_when: 'Use this benchmark when you need interpretable explanations for
  XGBoost models on tabular data with properly separated main effects and interactions.
  Ideal for CPU-only environments and for comparing against TreeSHAP-based approaches
  where entanglement of main effects with interactions is a concern.

  '
not_recommended_when: 'Do not use this if you require GPU acceleration (xgboost GPU
  mode is unsupported), need explanations for neural networks or non-tree models,
  or require explanations for high-cardinality categorical variables without one-hot
  encoding.

  '
