    ram_gb: 16
    disk_gb: 20
    gpu_count: 0
    gpu_vram_gb: 0
environment:
  python: '3.9'
  cuda: null
  pytorch: null
  flash_attn: null
  key_packages:
  - numpy
  notes:
  - CPU-only benchmark; no GPU acceleration required or beneficial
  - Pure numerical computation; torch/flash-attention not applicable
  - Python route requires numpy for matrix operations and random generation
  - C++ route compiles with standard g++/clang++ toolchain
  - See bundled README/requirements.txt for full dependency set
risk_flags:
- no_runtime_trust
- static_audit_only
risk_notes:
- Static code audit confirms executable anchors for all staged metrics
- No benchmark execution performed during this packaging pass
- Metric values marked as provisional until runtime verification completes
- Primary metric mean_clustering_loss code-backed via py/LO_K_means.py
recommended_when: 'Use this benchmark when you need a classic clustering task with
  strong algorithmic clarity, modest hardware requirements, and CPU-only execution.
  Appropriate for evaluating local optimality guarantees, comparing K-means variants,
  or studying convergence behavior on low-dimensional tabular data. Excellent for
  algorithm-focused research with minimal infrastructure overhead.

  '
not_recommended_when: 'Do not use this benchmark if you require GPU acceleration,
  deep learning workflows, high-dimensional embedding clustering, or large-scale distributed
  training. Not suitable for benchmarks requiring neural network backbones or vision-language
  components.

  '
