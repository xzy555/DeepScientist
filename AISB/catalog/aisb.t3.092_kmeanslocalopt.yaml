id: aisb.t3.092_kmeanslocalopt
name: Modified K-means Algorithm with Local Optimality Guarantees
version: 0.1.0
one_line: Optimize k-means with guaranteed local optimality while preserving classic
  algorithmic simplicity and same computational complexity.
task_description: 'This packaged benchmark covers modified K-means algorithms (LO-K-means)
  that guarantee convergence to locally optimal solutions, addressing a fundamental
  misconception in the field. The original K-means algorithm (Lloyd''s algorithm)
  does not always converge to a locally optimal solution despite widespread belief
  since the 1980s. The benchmark implements two variants: C-LO_K_means (continuous
  local optimality) and D-LO_K_means (discrete local optimality), along with Min_D_LO_K_means
  which balances improved accuracy with computational efficiency. All variants maintain
  the same per-iteration time complexity as the original K-means algorithm. The implementation
  supports weighted K-means clustering using general Bregman divergences, extending
  beyond squared Euclidean distance.

  '
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 1-2h
cost_band: low
difficulty: medium
data_access: public
primary_outputs:
- mean_clustering_loss
- minimum_clustering_loss
- average_computation_time_s
- average_number_of_iterations
launch_profiles:
- id: python_eval
  label: Python Eval
  description: Run the packaged Python implementation comparing Standard K-means,
    C-LO_K_means, D-LO_K_means, and Min_D_LO_K_means variants. Evaluates clustering
    loss and iteration count using Iris dataset. Primary code anchor is py/run.py
    with algorithm implementation in py/LO_K_means.py.
- id: cpp_eval
  label: C++ Eval
  description: Use the primary C++ implementation for comprehensive local-optimality
    experiment family. Includes test_multiple_runs.cpp, test_real_world.cpp, and test_news20.cpp
    variants. Header implementation in cpp/LO_K_means.hpp with settings in cpp/Setting.hpp.
dataset_download:
  primary_method: bundled
  sources:
  - name: Iris dataset
    url: embedded
    path: data/Iris.txt
    format: custom
    description: Tab-separated text format with N, D header followed by data points
  notes:
  - Iris.txt bundled with N rows and D-dimensional points
  - C++ implementation includes additional real-world and synthetic test scenarios
  - Dataset loading handled by make_unique() function for weighted point processing
credential_requirements:
