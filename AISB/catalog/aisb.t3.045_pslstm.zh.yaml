executable_anchors:
- path: run_longExp.py
  role: main entry point
  description: 解析模型、数据集和训练配置的 CLI 参数；编排 Exp_Main。
- path: exp/exp_main.py
  role: experiment driver
  description: Exp_Main 类构建模型（P_sLSTM、LSTM、sLSTM、Informer、Autoformer、DLinear、Transformer），
    加载数据，进行训练和评估。
- path: utils/metrics.py
  role: metric computation
  description: 实现 MAE、MSE、RMSE、MAPE、MSPE、RSE、CORR 指标；metric() 返回 (mae, mse, rmse, mape, mspe, rse, corr)。
