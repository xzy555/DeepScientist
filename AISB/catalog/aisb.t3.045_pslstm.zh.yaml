recovery_notes: |
  静态代码审计发现所有阶段性指标都有可执行锚点。
  未执行运行时测试；指标值尚未经过验证。在选择 origin_path、source_ref 和
  evaluation_protocol.code_paths 时，应优先恢复现有代码文件而非仅依赖 README 的声明。
caveat_snapshot: |
  打包快照可通过提供的 shell 脚本运行。
  在指标值可用于对比报告之前，需要在所有数据集上执行完整的基准测试。
