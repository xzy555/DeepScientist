task_specifications:
- task_name: Quickselect
  type: classification
  ood_metric: length_ood_f1
  training_length_range: (10,30)
  evaluation_length_range: (10,1024)
  epochs: 100
  notes: 主要OOD基准；尖锐的注意力图保留第k个元素选择能力
- task_name: SubsetSumDecision
  type: classification
  complexity: NP-complete
  training_length_range: (8,8)
  value_range: (-5,5)
  epochs: 100
- task_name: Knapsack
  type: classification
  complexity: NP-hard
  training_length_range: (10,20)
  epochs: 100
- task_name: BalancedPartition
  type: classification
  complexity: NP-complete
  training_length_range: (10,30)
  epochs: 1000
- task_name: BinPacking
  type: classification
  complexity: NP-hard
  training_length_range: (10,30)
  epochs: 1000
- task_name: MinCoinChange
  type: classification
  training_length_range: (10,20)
  epochs: 100
- task_name: ConvexHull
  type: classification
  training_length_range: (10,30)
  epochs: 100
- task_name: FractionalKnapsack
  type: regression
  training_length_range: (10,20)
  epochs: 100
  notes: 回归任务预期OOD性能较低
- task_name: FloydWarshall
  type: regression
  training_length_range: (10,30)
  epochs: 100
  notes: 全源最短路径；OOD分数低于分类任务
- task_name: SCC
  type: classification
  training_length_range: (10,30)
  epochs: 100
- task_name: 3SUM
