id: aisb.t3.099_ollalanding
name: OLLA Constrained Sampling
version: 0.1.0
one_line: Constrained non-log-concave sampling with projection-free OLLA/OLLA-H samplers
  and diverse benchmark suite.
task_description: 'This packaged benchmark implements OLLA (Overdamped Langevin with
  LAnding), a suite of projection-free stochastic dynamics for sampling from constrained
  statistical distributions. The framework handles both nonlinear equality and inequality
  constraints without relying on projections or slack variables. OLLA enforces constraints
  by projecting the overdamped Langevin drift and diffusion onto the tangent space
  of the feasible set and uses a restitution ("landing") mechanism to guarantee convergence
  to the constraint manifold. The benchmark includes five sampler implementations
  (OLLA, OLLA-H, CLangevin, CHMC, CGHMC) and seven constraint problems spanning 2D
  toy geometries, high-dimensional synthetic stress tests, polymer chain simulations,
  and a fairness-aware Bayesian neural network. OLLA-H uses Hutchinson trace estimation
  for scalable high-dimensional performance. The benchmark evaluates sampling quality
  via test negative log-likelihood (test_nll), effective sample size (ESS), CPU time,
  and constraint violation metrics.

  '
capability_tags:
- research_code_optimization
- sampling
- constrained_optimization
- probabilistic_modeling
- monte_carlo
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
