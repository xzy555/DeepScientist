launch_profiles:
- id: quick_analysis
  label: Quick Analysis
  description: 'Run constrained-sampling analysis on a small experiment subset. Executes
    experiments/run_analysis.py with a default constraint and sampler selection on
    CPU. Suitable for validation runs and method familiarization. Typical runtime:
    1-4 hours.

    '
  command_template: python experiments/run_analysis.py --experiments circle --samplers
    OLLA-H --device cpu
- id: full_sampler_suite
  label: Full Sampler Suite
  description: 'Execute the complete OLLA benchmark workflow across all constraint
    problems and all five samplers (OLLA, OLLA-H, CLangevin, CHMC, CGHMC). Includes
    2D experiments with PDF visualization, high-dimensional stress tests, polymer
    chain sampling, and German Credit Bayesian neural network. Produces CSV summaries,
    ESS metrics, constraint violation diagnostics, and test_nll comparisons. Typical
    runtime: 6-24 hours.

    '
  command_template: python experiments/run_analysis.py --experiments circle two_lobe
    quadratic_poly mix_gaussian highdim_stress highdim_polymer german_credit --samplers
    OLLA OLLA-H CLangevin CHMC CGHMC --device cpu
