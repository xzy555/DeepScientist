constraint_library:
- id: circle
  description: 2D Gaussian restricted to unit circle (x1^2 + x2^2 = 1). Analytic manifold
    initialization.
- id: quadratic_poly
  description: Polynomial equality (x1^4 x2^2 + x1^2 + x2 = 1) with inequality (x1^3
    - x2^3 <= 1). Rejection-based init.
- id: mix_gaussian
  description: Nine-component isotropic Gaussian mixture constrained to seven-lobed
    star contour with polynomial inequality.
- id: two_lobe
  description: Double-moon density via inequality constraint. Highlights curved boundaries
    without equalities.
- id: highdim_stress
  description: Random high-dimensional linear and spherical equalities with spherical
    obstacle inequalities. Scalability test.
- id: highdim_polymer
  description: Configurable 3D polymer chain with bond-length, bond-angle constraints,
    steric inequalities, torsion/WCA potentials.
- id: german_credit
  description: Fairness-aware 2-layer Bayesian neural network with TPR/FPR parity
    equality and feature monotonicity inequalities.
sampler_implementations:
- id: OLLA
  class: OLLA
  path: src/samplers/olla.py
  description: Original OLLA with analytic trace correction. Low-to-moderate dimensions.
- id: OLLA-H
  class: OLLA_H
  path: src/samplers/olla_h.py
  description: Hutchinson-trace variant. Preferred for high-dimensional problems or
    many constraints. Set Hutchinson probes N=0 for maximum speed.
- id: CLangevin
  class: CLangevin
  path: src/samplers/clangevin.py
  description: Constrained Langevin with slack-variable augmentation and SHAKE-style
    projections for inequality handling.
- id: CHMC
  class: CHMC
  path: src/samplers/chmc.py
  description: Constrained Hamiltonian Monte Carlo using RATTLE integrator on augmented
    state with slack variables.
- id: CGHMC
  class: CGHMC
  path: src/samplers/cghmc.py
  description: Constrained generalized HMC with Metropolis-Hastings correction. Inequality
    constraints via rejection during MH step.
execution_notes: 'All samplers inherit from BaseSampler (src/samplers/__init__.py)
  which standardizes RNG handling, step-size configuration, and return conventions
  (trajectory, h_vals, g_vals). The experiment runner (run_analysis.py) generates
  CSV summaries, optional PDF plots for 2D experiments, and prints diagnostics including
  ESS, constraint violations, and task-specific metrics. Each constraint module exposes
  EXPERIMENT_SETTINGS (steps, particle counts) and SAMPLER_SETTINGS (per-sampler hyperparameters)
  consumed by the runner.

  '
