- pdf_plots
snapshot_status: runnable
support_level: advanced
recommended_when: 'Use this benchmark when you need to evaluate constrained sampling
  algorithms on challenging nonconvex constraint sets, compare OLLA/OLLA-H against
  classical constrained samplers (Langevin, HMC, GHMC), or stress-test sampler scalability
  across low-dimensional (2D) to high-dimensional (100+ dim) problems.

  '
not_recommended_when: 'Do not use this benchmark for simple supervised-learning tasks,
  unconstrained sampling problems, or when only basic log-concave convex-constrained
  sampling is required.

  '
