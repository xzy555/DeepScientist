hyperparameters:
  common:
    optimizer: SGD
    learning_rate: 0.01
    momentum: 0.9
    weight_decay: 1.0e-05
    batch_size: 50
    local_epochs: 5
    total_rounds: 500
  fedgmt_specific:
    ema_coefficient_alpha:
    - 0.95
    - 0.995
    - 0.998
    sharpness_strength_gamma:
    - 0.5
    - 1.0
    - 2.0
    penalty_coefficient: 10
    swa_start_round: 400
    swa_window: 100
algorithm_family:
- FedAvg
- FedDyn
- FedSAM
- FedSpeed
- FedSMOO
