    description: Primary evaluation script for BCIC-IV-2a dataset
    metrics:
    - balanced_accuracy
    - cohens_kappa
    - weighted_f1
  training:
  - path: pretrain_main.py
    description: Foundation model pretraining entry point
    defaults:
      epochs: 40
      batch_size: 128
      lr: 5e-4
      weight_decay: 5e-2
