    description: Example fine-tuning shell script
  models:
  - path: models/CSBrain.py
    description: Core CSBrain model architecture
  - path: models/CSBrain_transformer.py
    description: Transformer layers with CST and SSA modules
  - path: models/model_for_bciciv2a.py
    description: BCIC-IV-2a specific model wrapper with brain region encoding
datasets_supported:
- BCIC-IV-2a
- BCIC-IV-2b
- CHB-MIT
- TUAB
- TUEV
- SEED-V
- SEED-VIG
- ISRUC-Sleep
- PhysioNet
- FACED
- Mumtaz2016
- SHU
- Siena
- HMC
- TUSL
- Stress
key_innovations:
- Cross-scale Spatiotemporal Tokenization (CST): Aggregates multi-scale features within
    temporal windows and brain regions
- Structured Sparse Attention (SSA): Captures long-range dependencies while eliminating
    spurious correlations
- Masked autoencoding pretraining for generalizable EEG representations
- Brain region encoding (frontal, parietal, temporal, occipital, central) for spatial
  awareness
