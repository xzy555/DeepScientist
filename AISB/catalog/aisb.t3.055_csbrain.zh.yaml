key_innovations:
- 跨尺度时空分词（CST）：在时间窗口和脑区域内聚合多尺度特征
- 结构化稀疏注意力（SSA）：捕获长距离依赖关系，同时消除虚假相关性
- 用于通用脑电表示的掩码自编码预训练
- 脑区域编码（额叶、顶叶、颞叶、枕叶、中央）以实现空间感知
