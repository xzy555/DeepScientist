id: aisb.t3.058_mindglitch
name: 'Mind-the-Glitch: Visual Correspondence for Detecting Inconsistencies in Subject-Driven
  Generation'
version: 0.1.0
one_line: Disentangle visual and semantic features from diffusion backbones to quantify
  and localize inconsistencies in subject-driven image generation.
task_description: 'This benchmark implements the Mind-the-Glitch framework from NeurIPS
  2025, which disentangles visual and semantic features from pre-trained diffusion
  model backbones to enable visual correspondence matching. The core contribution
  is the Visual Semantic Matching (VSM) metric, which quantifies the degree of visual
  inconsistency between a reference subject and generated images while also supporting
  spatial localization of inconsistent regions. Unlike global feature-based metrics
  (CLIP, DINO) or VLM-based approaches, VSM captures fine-grained appearance-level
  variations independent of pose, scale, or context. The package includes pre-trained
  MTG model weights, inference code, and a playground notebook demonstrating feature
  extraction, correspondence computation, and inconsistency scoring. Training code,
  training dataset generation pipeline, and full benchmark evaluation code are not
  yet released.

  '
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: partial
support_level: advanced
time_band: 2-6h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- spearman_correlation
- pearson_correlation
- vsm_scores
- mtg_inference_scores
launch_profiles:
- id: playground
  label: Playground
  description: 'Run the interactive playground notebook to load the pre-trained MTG
    model, perform inference on sample image pairs, visualize disentangled semantic
    and visual features, and compute VSM scores for inconsistency detection.

    '
- id: inference_eval
  label: Inference Eval
  description: 'Run the packaged evaluation scripts (eval_run_iter10_tta.py, eval_run_iter12_weighted_tta.py)
    to compute Spearman and Pearson correlations between VSM metric and oracle judgments
    on the test dataset. Note that full training pipeline and benchmark evaluation
    code are not yet released in this snapshot.

    '
dataset_download:
  primary_method: git_huggingface
  sources:
  - type: github
    url: https://github.com/abdo-eldesokey/mind-the-glitch
    note: Clone with submodules; requires Grounded-Segment-Anything submodule setup
  - type: huggingface
    url: https://huggingface.co/mind-the-glitch
    note: Pre-trained model weights and safetensors
  notes:
  - Clone recursively: git clone --recursive
  - Initialize submodules after clone if needed
  - Set HF_HOME environment variable for model cache
  - HF token may be required for some model downloads
credential_requirements:
  mode: optional_token
  items:
  - huggingface_token
  notes:
  - HF_TOKEN may be needed for gated model access; an anonymous token is used in eval
    scripts
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 80
    gpu_count: 1
    gpu_vram_gb: 16
    cuda_capability: '8.0'
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 150
    gpu_count: 1
    gpu_vram_gb: 24
    cuda_capability: '8.6'
environment:
  python: '3.11'
  cuda: '12.4'
  pytorch: 2.5.1
  flash_attn: null
  key_packages:
  - torch==2.5.1
  - torchvision==0.20.1
  - omegaconf
  - hydra-core
  - safetensors
  - scipy
  - Pillow
  - numpy
  - scikit-image
  - GroundingDINO
  - segment-anything
  notes:
  - Grounded-Segment-Anything must be installed separately after cloning
  - See bundled requirements.txt for complete dependency list
  - HF endpoint configured to mirror for faster downloads in eval scripts
risk_flags:
- inference_only
- no_training_release
- no_benchmark_eval_release
risk_notes:
- Current snapshot provides inference-only functionality
- Training code and training dataset generation pipeline are not released
- Full benchmark evaluation framework is not yet included
- Static code audit confirms executable anchors exist for staged metrics
- No runtime execution was performed during this packaging pass
recommended_when: 'Use this benchmark when you need to evaluate subject consistency
  in subject-driven image generation, compare VSM against existing metrics (CLIP,
  DINO, LPIPS), or leverage visual correspondence for localizing inconsistent regions
  within generated subjects.

  '
not_recommended_when: 'Do not use this benchmark if you require a complete training
  pipeline, need to train or fine-tune the MTG model, or require the full benchmark
  evaluation framework with standardized test sets and oracle comparisons. The current
  release is inference-oriented only.

  '
