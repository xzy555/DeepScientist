constraint_library:
- id: circle
  description: 二维高斯仅限于单位圆 (x1^2 + x2^2 = 1)。解析流形初始化。
- id: quadratic_poly
  description: 多项式等式 (x1^4 x2^2 + x1^2 + x2 = 1) 和不等式 (x1^3 - x2^3 <= 1)。基于拒绝的 init。
- id: mix_gaussian
  description: 九分量各向同性高斯混合约束为具有多项式不等式的七瓣星形轮廓。
- id: two_lobe
  description: 通过不等式约束的双月密度。突出显示不等式的弯曲边界。
- id: highdim_stress
  description: 随机高维线性和球面等式以及球面障碍物不等式。可扩展性测试。
- id: highdim_polymer
  description: 可配置的 3D 聚合物链，具有键长、键角约束、空间不等式、扭转/WCA 势。
- id: german_credit
  description: 具有 TPR/FPR 奇偶性和特征单调性不等式的公平感知 2 层贝叶斯神经网络。
sampler_implementations:
- id: OLLA
  class: OLLA
  path: src/samplers/olla.py
  description: 带有分析迹线校正的原始 OLLA。低到中等尺寸。
- id: OLLA-H
  class: OLLA_H
  path: src/samplers/olla_h.py
  description: 哈金森踪迹变体。对于高维问题或许多约束的首选。设置 Hutchinson 探针 N=0 以获得最大速度。
- id: CLangevin
  class: CLangevin
  path: src/samplers/clangevin.py
  description: 使用松弛变量增强和 SHAKE 式预测来约束 Langevin，以处理不平等问题。
- id: CHMC
  class: CHMC
  path: src/samplers/chmc.py
  description: 在具有松弛变量的增强状态上使用 RATTLE 积分器进行约束哈密顿蒙特卡罗。
- id: CGHMC
  class: CGHMC
  path: src/samplers/cghmc.py
  description: 具有 Metropolis-Hastings 校正的约束广义 HMC。 MH 步骤期间通过拒绝进行不平等约束。
execution_notes: 'All samplers inherit from BaseSampler (src/samplers/__init__.py) which standardizes RNG handling, step-size configuration, and return conventions (trajectory, h_vals, g_vals). The experiment runner (run_analysis.py) generates CSV summaries, optional PDF plots for 2D experiments, and prints diagnostics including ESS, constraint violations, and task-specific metrics. Each constraint module exposes EXPERIMENT_SETTINGS (steps, particle counts) and SAMPLER_SETTINGS (per-sampler hyperparameters) consumed by the runner.

  '
