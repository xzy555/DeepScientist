    count: 8
    names:
    - ETTH1
    - ETTH2
    - ETTM1
    - ETTM2
    - Weather
    - Electricity
    - Traffic
    - ILI
    horizon_lengths:
    - 96
    - 192
    - 336
    - 720
  monash:
    count: 29
    note: Auto-downloaded during execution
  gift_eval:
    count: 23
    note: Used for MASE evaluation in zero-shot setting
  probabilistic:
    datasets:
    - Walmart
    - Istanbul Traffic
    - Turkey Power
    note: Requires separate Kaggle downloads
metric_contracts:
  origin_path: long_term_tsf/run.py
  source_ref: Exp_Long_Term_Forecast
  metrics_summary:
    avg_mse:
      status: code-backed
      aggregation: mean across all datasets and horizons
    avg_mae:
      status: code-backed
      aggregation: mean across all datasets and horizons
    mse_96:
      status: code-backed
      horizon: 96
    mse_192:
      status: code-backed
      horizon: 192
    mse_336:
      status: code-backed
      horizon: 336
    mse_720:
      status: code-backed
      horizon: 720
  caveat: 'Static code audit confirmed executable anchors for all staged metrics.
    No benchmark execution performed in packaging pass; runtime validation required.

    '
executables:
- path: long_term_tsf/run.py
  type: main_evaluation
  dependencies:
  - exp/exp_long_term_forecasting.py
  - requirements.txt
- path: eval_gluonts/run.py
  type: gluonts_evaluation
  dependencies:
  - eval_gluonts/dataset.py
  - visionts/model.py
  - visionts/models_mae.py
- path: eval_gluonts/run_monash.sh
  type: monash_evaluation_script
- path: eval_gluonts/run_pf.sh
  type: probabilistic_forecast_script
