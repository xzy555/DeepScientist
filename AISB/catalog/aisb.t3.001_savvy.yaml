schema_version: 1
id: aisb.t3.001_savvy
name: 'SAVVY: Spatial Awareness via Audio-Visual LLMs through Seeing and Hearing'
version: 0.1.0
one_line: Optimize the bundled SAVVY audio-visual spatial reasoning stack and SAVVY-Bench evaluation workflow.
task_description: This packaged benchmark covers SAVVY's training-free spatial reasoning pipeline together
  with SAVVY-Bench evaluation for dynamic 3D audio-visual question answering. The task is to recover object
  trajectories from video, audio, and text-guided segmentation cues, build a unified global 3D map, and
  answer egocentric or allocentric spatial questions on benchmark clips. Primary staged metrics track
  overall benchmark accuracy plus the evaluator's spatial AVQA and relative-accuracy outputs.
capability_tags:
- research_code_optimization
- multimodal_reasoning
- audio_visual_learning
- spatial_reasoning
- benchmark_evaluation
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: high
time_band: 1-2d
difficulty: hard
data_access: public
risk_flags:
- route_caveat
- licensed_data_route
- multi_env_benchmark
risk_notes:
- The core SAVVY algorithm is training-free, but a full paper-faithful route spans separate SAVVY and
  SAVVY-Bench components plus per-model evaluation environments.
- The public Hugging Face SAVVY-Bench helps, but the raw preprocessing route still references Project
  Aria licensed data and hundreds of GB of multimodal assets.
- The pipeline depends on third-party models and tools such as ZoeDepth, EfficientViT segmentation components,
  and Gemini-based snapshot-descriptor scripts.
recommended_when: Use this benchmark when you want a training-free but systems-heavy AV-LLM spatial reasoning
  benchmark with both pipeline execution and benchmark evaluation.
not_recommended_when: Do not use this if you need a single-env benchmark, low local storage, or a route
  with no external model and API dependencies.
