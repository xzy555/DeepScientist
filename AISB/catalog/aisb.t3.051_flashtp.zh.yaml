schema_version: 1
id: aisb.t3.051_flashtp
name: FlashTP：用于机器学习原子间势能融合的稀疏感知张量积
version: 0.1.0
one_line: >
  对融合的稀疏感知CUDA张量积内核进行基准测试和优化，加速等变机器学习原子间势能（MLIP），以毫秒为单位测量前向、反向和双反向内核延迟。
task_description: >
  本基准测试评估等变机器学习原子间势能（MLIP）中使用的张量积层的CUDA内核性能。张量积层是等变MLIP模型（如SevenNet）中的主要计算瓶颈，占推理时间的89%和训练时间的75%。FlashTP通过将张量积层及其后续归约层中的所有内核融合为单一内核、利用Clebsch-Gordan系数矩阵的高稀疏性（71-86%），并引入路径聚合执行以增加输入重用来解决这一问题。

  评估流程完全自包含：使用ir_config/中的IR配置（NequIP、MACE、SevenNet配置已捆绑）运行example/benchmark_timing.py。该脚本使用CUDA事件对前向、反向和双反向传播进行计时（50次预热迭代，200次计时迭代），并以毫秒为单位报告每次迭代的延迟。可以通过example/test.sh进行更简单的冒烟测试。无需外部数据集、凭证或评估服务器。必须从源码编译自定义CUDA扩展（pip install . --no-build-isolation），这可能需要长达10分钟。默认情况下，内核针对NVIDIA A100（sm_80）和H100（sm_90）编译；设置CUDA_ARCH_LIST以针对其他架构。

  优化任务是提高内核吞吐量（降低forward_ms、backward_ms、double_backward_ms），同时不违反与参考e3nn TensorProduct实现的数值正确性。
