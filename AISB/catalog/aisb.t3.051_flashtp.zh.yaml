- systems_efficiency
- gpu_kernel_fusion
- sparse_computation
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: advanced
cost_band: high
time_band: 2-6h
difficulty: hard
data_access: public
primary_outputs:
- forward_ms
- backward_ms
- double_backward_ms
- kernel_benchmark
launch_profiles:
- id: microbenchmark
  label: 微观基准
  description: >
    在单个IR配置上运行example/benchmark_timing.py，测量前向、反向和双反向内核延迟。最快的方式；每个配置几分钟内完成。
- id: full_eval
  label: 完整评估
  description: >
    跨所有捆绑的IR配置（NequIP、MACE、SevenNet）运行基准测试，包含多个边数和数据类型，以生成全面的内核性能配置文件。
- id: smoke_test
  label: 冒烟测试
  description: >
    运行example/test.sh验证CUDA扩展编译成功，并在一种NequIP配置（4_32_3_p_sc，32768条边，fp32）上确认FlashTP内核产生正确输出。
dataset_download:
  primary_method: none
  sources: []
  notes:
  - 无需下载外部数据集。所有用于微观基准测试的IR配置都捆绑在ir_config/中。
  - 边图在运行时由flashTP_e3nn.utils.fixed_generate_edgepair合成生成。
credential_requirements:
  mode: none
  items: []
  notes: []
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 50
    gpu_count: 1
    gpu_vram_gb: 24
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 120
    gpu_count: 1
    gpu_vram_gb: 80
environment:
  python: '3.10'
  cuda: '12'
  pytorch: 2.4.1
  key_packages:
  - e3nn==0.6.6
  - torch_scatter
  notes:
  - README明确要求CUDA Toolkit 12或更高版本。
  - Python 3.11被提及为非严格要求；3.10+应该可以工作。
  - 在pip install期间编译自定义CUDA内核最多需要10分钟。
  - 默认CUDA_ARCH_LIST针对sm_80（A100）和sm_90（H100）。设置CUDA_ARCH_LIST以匹配您的GPU。
  - torch_scatter是精确e3nn参考基准测试所必需的。
  - 完整的依赖项列表请参见requirements.txt和pyproject.toml。
risk_flags:
- custom_cuda_compilation
- gpu_architecture_dependency
risk_notes:
  - CUDA扩展必须从源码编译；在不支持的架构上编译失败是常见的失败模式。
  - 默认构建仅针对A100/H100。其他GPU需要将CUDA_ARCH_LIST设置为正确的计算能力。
  - 打包过程中未执行基准测试运行；指标值应在运行时验证。
  - e3nn参考实现用于数值正确性检查；不匹配的e3nn版本可能导致细微差异。
recommended_when: >
  当您需要一个专注于原子级ML工作负载中等变张量积操作的独立CUDA内核优化任务时使用此基准测试。非常适合评估内核融合、稀疏性利用和GPU内存优化策略，使用具有前向/反向/双反向阶段的定义明确的微观基准。
not_recommended_when: >
  如果您无法编译自定义CUDA扩展、缺少计算能力8.0+的NVIDIA GPU，或需要带有端到端MD模拟评估的高级应用程序基准测试，请勿使用此基准测试。不适合纯CPU环境。
