schema_version: 1
id: aisb.t3.056_infosam
name: 'InfoSAM: Fine-Tuning the Segment Anything Model from An Information-Theoretic Perspective'
version: 0.1.0
one_line: Optimize SAM finetuning with information-theoretic distillation that preserves domain-invariant
  segmentation knowledge.
task_description: This packaged benchmark covers parameter-efficient SAM fine-tuning with information-theoretic
  distillation for specialized segmentation domains. The task is to preserve SAM's domain-invariant relational
  knowledge while adapting the student model to downstream datasets, then evaluate segmentation quality
  with S-measure, E-measure, and weighted F-measure. The current local snapshot preserves the paper-facing
  README and optimization notes, but the train and eval launcher tree referenced by the README is not
  bundled here.
capability_tags:
- research_code_optimization
- computer_vision
- segmentation
- foundation_models
- distillation
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: analysis_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: high
time_band: 1-2d
difficulty: hard
data_access: public
risk_flags:
- source_snapshot_incomplete
- route_caveat
risk_notes:
- The surviving local snapshot is documentation-heavy and does not include the train/eval launcher tree
  referenced by the README.
- README commands point to missing files such as `data/data_download.py`, `config/eval/InfoSAM_b_leaf.sh`,
  and `config/train/InfoSAM_b_leaf.sh`.
- Treat this package as a paper-backed reconstruction target until the upstream training and evaluation
  scripts are restored locally.
recommended_when: Use this benchmark when you want to reconstruct or audit a SAM PEFT route from paper
  materials and are prepared to restore missing upstream files.
not_recommended_when: Do not use this as a ready-to-run local benchmark; the packaged snapshot is incomplete
  relative to the official README.
