id: aisb.t3.056_infosam
name: 'InfoSAM: Fine-Tuning the Segment Anything Model from An Information-Theoretic
  Perspective'
version: 0.1.0
one_line: Information-theoretic SAM fine-tuning via mutual-information-based distillation
  preserving domain-invariant relational knowledge for specialized segmentation.
task_description: 'InfoSAM is a parameter-efficient fine-tuning (PEFT) framework for
  SAM that enhances segmentation performance in specialized domains by preserving
  pre-trained domain-invariant knowledge through information-theoretic distillation.
  The method introduces two novel mutual information-based objectives: (1) a relational
  compression loss that extracts domain-invariant structural patterns from pre-trained
  SAM by minimizing mutual information between task-irrelevant features and the relational
  module outputs, and (2) a cross-model distillation loss that maximizes mutual information
  between teacher (pre-trained SAM) and student (fine-tuned SAM) relational representations.
  The approach uses attention-driven relation modules and Renyi entropy-based quantification
  with normalized Gram matrices computed via Frobenius norm. Benchmarked across diverse
  domains including natural images, medical imaging, agriculture (leaf disease), and
  remote sensing.

  '
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
