id: aisb.t3.078_conformalanomaly
name: CADES - Conformal Anomaly Detection in Event Sequences
version: 0.1.0
one_line: 面向连续时间事件序列的统计异常检测框架，基于 conformal inference 提供有限样本 FPR 控制。
task_description: 该条目覆盖 CADES（Conformal Anomaly Detection in Event Sequences），该 ICML 2025 方法将 conformal inference 用于检测由时序点过程生成的异常事件序列。方法利用 time-rescaling theorem 设计两种互补的非一致性分数，以缓解既有统计量（如 KS、间隔平方和）中的不可辨识问题，并结合 Bonferroni 校正，提供边际与校准条件下的 FPR 保证。当前本地快照仅保留论文元数据与指标定义，不含可执行源码；需先进行上游恢复。
