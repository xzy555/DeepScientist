requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: high
time_band: 1d+
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want an inference-heavy LLM task that mixes synthesis prompts,
  benchmark evaluation, and optional training data generation.
not_recommended_when: Do not use this if you cannot host 8B-class models or if you need a benchmark without
  model-serving overhead.
