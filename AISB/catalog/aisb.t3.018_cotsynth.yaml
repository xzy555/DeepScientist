schema_version: 1
id: aisb.t3.018_cotsynth
name: 'CoT-based Synthesizer: Enhancing LLM Performance through Answer Synthesis'
version: 0.1.0
one_line: Optimize answer synthesis and majority-vote aggregation for math and table QA benchmarks using
  8B-scale models.
task_description: This packaged benchmark covers answer synthesis and majority-vote aggregation for math
  and table question answering using 8B-scale models. The task is to generate diverse candidate chains
  of thought, aggregate them effectively, and improve benchmark accuracy across the supported reasoning
  datasets.
capability_tags:
- research_code_optimization
- large_language_models
- answer_synthesis
- mathematical_reasoning
- table_qa
