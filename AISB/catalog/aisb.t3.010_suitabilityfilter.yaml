schema_version: 1
id: aisb.t3.010_suitabilityfilter
name: 'Suitability Filter: A Statistical Framework for Classifier Evaluation in Real-World Deployment
  Settings'
version: 0.1.0
one_line: Optimize a deployment-time statistical filter for deciding whether a classifier remains safe
  to use under shift.
task_description: This packaged benchmark covers a deployment-time statistical filter that decides whether
  a classifier remains safe to use under distribution shift. The task is to detect when the downstream
  model should be trusted, abstained, or filtered under changing data conditions while improving the benchmark's
  safety-oriented selection metric.
capability_tags:
- research_code_optimization
- classifier_evaluation
- distribution_shift
- statistical_testing
- reliability
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: medium
time_band: 6-24h
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want a model-monitoring task that combines statistical testing
  with realistic WILDS deployment shifts.
not_recommended_when: Do not use this if you need a tiny toy benchmark or cannot host the underlying WILDS
  datasets and pretrained models.
paper:
  title: 'Suitability Filter: A Statistical Framework for Classifier Evaluation in Real-World Deployment
    Settings'
  venue: ICML 2025
  year: 2025
