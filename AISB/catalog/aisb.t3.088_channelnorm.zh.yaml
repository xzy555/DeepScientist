id: aisb.t3.088_channelnorm
name: 用于时间序列通道识别的通道归一化
version: 0.1.0
one_line: 特定于通道的仿射归一化可增强时间序列预测模型中的通道可识别性。
task_description: 该基准条目涵盖了通道归一化 (CN)，这是一种归一化策略，可为时间序列模型中的每个通道分配不同的仿射变换参数，从而实现通道可识别性 (CID)。当前的本地快照保留纸张元数据和乳胶源，但不包含可执行的基准代码或可运行的评估脚本。打包基准旨在用于 CN 预测实施的纸质规划和上游恢复。提出了两种变体：自适应 CN (ACN) 根据输入时间序列动态调整参数，而原型 CN (PCN) 使用可学习原型来处理具有未知或变化通道数的数据集，便于在时间序列基础模型中使用。
