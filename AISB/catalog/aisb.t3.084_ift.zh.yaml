id: aisb.t3.084_ift
name: Towards Accurate Time Series Forecasting via Implicit Decoding
version: 0.1.0
one_line: 基于论文的时间序列解码器优化路线，采用隐式频域预测模块；当前需先恢复上游源码。
task_description: 该条目覆盖 NeurIPS 2025 的 Implicit Forecaster（IF）方法。它将现有时间序列 Transformer 编码器的输出 MLP 解码层替换为新的频域解码模块。不同于逐点独立预测，IF 通过预测由频率、振幅、相位参数化的组成波形来全局形成预测，更好处理长短期动态与多周期性模式。该方法与架构无关，可提升 Informer、Autoformer、PatchTST、iTransformer 等主流 TSF 模型。当前快照仅保留元数据与指标契约，不含代码、启动脚本和 README；适合基于论文的规划与恢复，不适合直接本地执行。
