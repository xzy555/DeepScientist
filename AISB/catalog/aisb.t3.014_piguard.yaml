schema_version: 1
id: aisb.t3.014_piguard
name: 'PIGuard: Prompt Injection Guardrail via Mitigating Overdefense for Free'
version: 0.1.0
one_line: Optimize a prompt-injection guard model that must improve malicious detection without overblocking
  benign prompts.
task_description: This packaged benchmark covers a prompt-injection guard model that must improve malicious
  detection without overblocking benign prompts. The task is to tune the guard's scoring or training route
  so that injection recall improves while false positives remain controlled on the benchmark data.
capability_tags:
- research_code_optimization
- llm_security
- classification
- prompt_injection
- robustness
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: medium
time_band: 6-24h
difficulty: medium
data_access: restricted
recommended_when: Use this benchmark when you want a security-oriented text classification task with both
  benign-utility and attack-detection pressure.
not_recommended_when: Do not use this if you cannot access the full evaluation suite or if you need a
  GPU-free benchmark.
paper:
  title: 'PIGuard: Prompt Injection Guardrail via Mitigating Overdefense for Free'
  venue: ACL 2025
  year: 2025
  url: https://aclanthology.org/2025.acl-long.1468/
