schema_version: 1
id: aisb.t3.043_vhm
name: 'VHM: Versatile and Honest Vision Language Model for Remote Sensing Image Analysis'
version: 0.1.0
one_line: Optimize a 7B remote-sensing vision-language model across large-scale caption pretraining and
  downstream evaluation.
task_description: This packaged benchmark covers two-stage training and downstream evaluation for a 7B
  remote-sensing vision-language model. The task is to pretrain VHM on the large VersaD image-text corpus,
  run supervised fine-tuning on remote-sensing instruction data, and then evaluate downstream remote-sensing
  understanding tasks through the RSEvalKit stack. The primary staged metric is AID scene classification
  accuracy, while the current local snapshot bundles the training code but still depends on external evaluation
  tooling.
capability_tags:
- research_code_optimization
- remote_sensing
- vision_language_models
- multimodal_learning
- computer_vision
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: very_high
time_band: 2-4d
difficulty: hard
data_access: public
risk_flags:
- route_caveat
- external_eval_dependency
- large_dataset_route
risk_notes:
- The paper-faithful route spans pretraining, SFT, and separate RSEvalKit evaluation rather than one self-contained
  local command.
- The upstream README reports about 10 hours of pretraining on 16x A100 80GB GPUs and about 4 hours of
  SFT on 8x A100 80GB GPUs; slower local runs on smaller setups should be budgeted in days.
- 'Dataset preparation is heavy: VersaD is about 140 GB extracted, VHM_SFT about 124 GB, and VHM_Eval
  about 7.35 GB before checkpoints and caches.'
- The optimizer evidence for AID scene classification depends on external RSEvalKit, not a fully bundled
  evaluator inside this snapshot.
recommended_when: Use this benchmark when you explicitly want a storage-heavy, multi-day multimodal training
  plus evaluation route and can provision multi-GPU hardware.
not_recommended_when: Do not use this for single-GPU smoke tests or when you need a self-contained evaluator
  fully bundled inside the packaged snapshot.
