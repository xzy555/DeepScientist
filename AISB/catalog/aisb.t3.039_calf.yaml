schema_version: 1
id: aisb.t3.039_calf
name: 'CALF: Aligning LLMs for Time Series Forecasting via Cross-modal Fine-Tuning'
version: 0.1.0
one_line: Optimize cross-modal fine-tuning for time-series forecasting on LLM backbones.
task_description: This packaged benchmark covers cross-modal fine-tuning for time-series forecasting on
  top of LLM backbones. The task is to adapt a language-model-style architecture to time-series inputs,
  tune cross-modal components, and improve long-horizon forecasting performance.
