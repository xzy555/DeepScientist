time_band: 1d+
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want a forecasting task that truly exercises LLM-time-series
  alignment and cross-modal finetuning.
not_recommended_when: Do not use this if you need a small CPU-first time-series benchmark or cannot provision
  high-memory GPUs.
