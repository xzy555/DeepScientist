id: aisb.t3.050_causalpfn
name: 'CausalPFN：通过上下文学习实现摊销式因果效应估计'
version: 0.1.0
one_line: 基于Transformer的摊销式因果效应估计，采用PFN风格的上下文学习，具备校准的不确定性量化。
task_description: 'CausalPFN是一个Transformer模型，通过在一个包含大量模拟数据生成过程（DGP）的大型库上进行训练来实现摊销式因果效应估计，这些数据生成过程满足可忽略性假设。面对新的观测数据集时，它通过上下文学习直接推断因果效应，无需任务特定的调优、微调或超参数优化。该模型同时估计条件平均处理效应（CATE）和平均处理效应（ATE），并通过基于原则的不确定性量化框架产生有限样本校准的可信区间。摊销式方法将计算负担从推理阶段转移到预训练阶段，使得在新数据集上的评估仅需快速的前向传播即可完成。'
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: external_eval_required
support_level: recovery
time_band: 2-8h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- ihdp_pehe
- ihdp_ate_rel_err
- causal_predictions
- bootstrap_report
launch_profiles:
- id: quick_eval
  label: 快速评估
  description: 在单个支持的数据集（如IHDP）上使用默认设置运行CausalPFN评估。适用于验证安装和基本功能。
- id: full_benchmark
  label: 完整基准
  description: 在IHDP、ACIC和Lalonde数据集上运行完整的摊销式因果效应基准测试，包含Bootstrap集成聚合和温度缩放。
dataset_download:
  primary_method: pypi
  sources:
  - name: PyPI
    url: https://pypi.org/project/causalpfn/
    archive_type: null
    local_dir_name: null
  - name: HuggingFace Hub
    url: https://huggingface.co/vdblm/causalpfn
    archive_type: null
    local_dir_name: null
  notes:
  - 模型权重在运行时从HuggingFace Hub下载。
  - 安装方式：pip install causalpfn
  - 可选的开发依赖：pip install causalpfn[dev]
credential_requirements:
  mode: none
  items: []
  notes:
  - HuggingFace Hub访问需要网络连接以下载模型。
  - 可选的HF_TOKEN用于受限或私有模型的访问。
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 50
    gpu_count: 0
    gpu_vram_gb: 0
    notes: 通过causalpfn Python API的torch.device('cpu')支持仅CPU执行。
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 100
    gpu_count: 1
    gpu_vram_gb: 16
    notes: GPU加速推荐用于在大型数据集上实现更快的推理。
environment:
  python: '3.10'
  cuda: '11.8'
  pytorch: '2.3'
  flash_attn: null
  key_packages:
  - causalpfn>=1.0.0
  - torch>=2.3.0
  - numpy>=1.24.0
  - scikit-learn>=1.3.0
  - faiss-cpu==1.9.0
  - huggingface_hub>=0.20.0
  - tqdm>=4.65.0
  notes:
  - 仅CPU执行适用于最低资源配置。
  - 通过CUDA实现GPU加速以提升推理速度。
  - 完整依赖集可在捆绑的requirements.txt和pyproject.toml中找到。
risk_flags:
- external_model_download
- bootstrap_variance
risk_notes:
- 模型权重在运行时从HuggingFace Hub获取；请确保网络访问。
- Bootstrap集成在不同随机种子间引入方差；使用提供的bootstrap_report进行诊断。
recommended_when: '当因果推理任务需要易于本地运行的方案、清晰的效果估计指标（PEHE、ATE相对误差）和不确定性量化时，可使用此基准。是 uplift建模、从观测数据估计处理效应以及与专业因果估计器进行比较的理想选择。当需要无需手动调优的开箱即用估计器时，推荐使用。'
not_recommended_when: '如果需要大型多模态基准、原始语言生成任务或图像/视频理解，请勿使用此基准。当处理分配不可忽略或数据中存在未观测到的混杂因素时，不适用。'
paper:
  title: 'CausalPFN: Amortized Causal Effect Estimation via In-Context Learning'
  venue: NeurIPS 2025
  year: 2025
  url: https://arxiv.org/abs/2506.07918
  authors:
  - Vahid Balazadeh
  - Hamidreza Kamkari
  - Valentin Thomas
  - Benson Li
  - Junwei Ma
  - Jesse C. Cresswell
  - Rahul G. Krishnan
  institutions:
  - University of Toronto
  - Vector Institute
  - Layer 6 AI
display:
  palette_seed: mint-charcoal-causal
  art_style: causal-analytics
  accent_priority: medium
image_path: ../image/050_aisb.t3.050_causalpfn.jpg
capability_tags:
- causal_inference
- in_context_learning
- tabular_ml
- uncertainty_estimation
- uplift_modeling
- treatment_effect_estimation
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
code_anchors:
  evaluation:
  - path: eval.py
    description: Main evaluation script for IHDP benchmark with multi-seed bootstrap
      ensemble
  - path: src/causalpfn/evaluation.py
    description: Core evaluation metrics including PEHE and calibration curve calculations
  estimators:
  - path: src/causalpfn/causal_estimator.py
    description: CATEEstimator and ATEEstimator classes with confidence interval estimation
  benchmarks:
  - path: benchmarks/ihdp.py
    description: IHDP benchmark implementation
  - path: benchmarks/acic2016.py
    description: ACIC 2016 benchmark implementation
  - path: benchmarks/lalonde.py
    description: Lalonde benchmark implementation
  - path: benchmarks/hillstrom.py
    description: Hillstrom uplift modeling benchmark
metric_contract:
  ihdp_pehe:
    origin_path: eval.py
    source_ref: calculate_pehe
    evaluation_protocol:
      code_paths:
      - eval.py
      - src/causalpfn/evaluation.py
    status: code_backed
    provisional: false
  ihdp_ate_rel_err:
    origin_path: eval.py
    source_ref: calculate_ate_rel_error
    evaluation_protocol:
      code_paths:
      - eval.py
      - src/causalpfn/evaluation.py
    status: code_backed
    provisional: false
evaluation_details:
  bootstrap_ensemble:
    seeds: 2
    subsamples: 3
    subsample_fraction: 0.92
    temperature_values:
    - 0.3
    - 0.5
    - 0.7
    - 0.9
    - 2.0
    - 4.0
    - 8.0
    total_predictions_per_realization: 42
  s_learner:
    regressor: Ridge
    alpha: 0.001
    mu_features: true
  nearest_neighbors: 85
commercial:
  annual_fee: null
  notes: Apache 2.0 License
