id: aisb.t3.067_kanad
name: 'KAN-AD: Time Series Anomaly Detection with Kolmogorov-Arnold Networks'
version: 0.1.0
one_line: Lightweight KAN-based time-series anomaly detection using Fourier basis
  functions with 15% F1 improvement and 50% faster inference than vanilla KAN.
task_description: 'This packaged benchmark covers time-series anomaly detection (TSAD)
  using Kolmogorov-Arnold Networks (KAN) with redesigned univariate functions. The
  core innovation replaces B-spline basis functions (used in vanilla KAN) with truncated
  Fourier expansions, addressing KAN''s susceptibility to local disturbances in time
  series data. The approach reformulates TSAD as approximation of time series with
  smooth univariate functions, leveraging the insight that normal sequences exhibit
  greater local smoothness than anomalies. The method incorporates differencing to
  isolate trend effects and an index-based univariate function to capture fine-scale
  periodic patterns. The local snapshot currently preserves metadata and audit material
  rather than runnable code; executable source files require upstream restoration
  before benchmark execution.

  '
