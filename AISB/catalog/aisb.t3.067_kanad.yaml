technical_summary:
  problem_domain: Univariate time series anomaly detection (UTS-TSAD)
  input_format: Univariate time series x = [x_0, x_1, ..., x_t] with anomaly labels
  core_methodology:
  - Kolmogorov-Arnold Network backbone with redesigned univariate functions
  - B-splines replaced with truncated Fourier expansions
  - Index-based univariate function for fine-scale periodicity
  - Differencing incorporated to isolate trend effects
  key_insight: Normal sequences exhibit greater local smoothness than anomalies; reformulating
    TSAD as smooth function approximation mitigates overfitting to local disturbances
  three_stage_pipeline:
  - mapping: Decompose input time window into multiple univariate functions
  - reducing: Combine functions through learned coefficients to reconstruct normal
      patterns
  - projection: Leverage for anomaly scoring
  evaluation_datasets:
  - Four publicly available TSAD benchmark datasets (specific names not preserved
    in snapshot)
  baselines_compared:
  - TimesNet
  - Vanilla KAN
  - Other forecasting-based TSAD methods
  - VAE-based approaches (FCVAE)
