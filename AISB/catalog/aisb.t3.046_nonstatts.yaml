name: Battling the Non-stationarity in Time Series Forecasting via Test-time Adaptation
version: 0.1.0
one_line: Optimize test-time adaptation for non-stationary time-series forecasting with lightweight calibration
  modules.
task_description: This packaged benchmark covers test-time adaptation for non-stationary time-series forecasting
  with lightweight calibration modules. The task is to adapt a forecaster online or at evaluation time
  so that it remains accurate under evolving temporal dynamics.
