schema_version: 1
id: aisb.t3.012_efficientqat
name: 'EfficientQAT: Efficient Quantization-Aware Training for Large Language Models'
version: 0.1.0
one_line: Optimize low-bit LLM quantization-aware training and post-hoc calibration for 7B to 70B model
  families.
task_description: This packaged benchmark covers low-bit LLM quantization-aware training and post-hoc
  calibration across 7B to 70B model families. The task is to preserve model quality under aggressive
  quantization, tune QAT or calibration routes, and compare perplexity or task metrics against stronger
  full-precision baselines.
capability_tags:
- research_code_optimization
- large_language_models
- quantization
- model_compression
- efficient_inference
aisb_direction: T3
track_fit:
- paper_track
