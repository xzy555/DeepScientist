requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: high
time_band: 1d+
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want an LLM-systems task centered on quantization-aware
  training, calibration, and low-bit deployment.
not_recommended_when: Do not use this if you do not have access to high-memory GPUs or if you need a small-model-only
  benchmark.
