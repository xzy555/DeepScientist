id: aisb.t3.085_neuralsurv
name: 'NeuralSurv: Deep Survival Analysis with Bayesian Uncertainty Quantification'
version: 0.1.0
one_line: Bayesian deep survival analysis with CAVI inference, sigmoidal hazard modeling,
  and uncertainty-aware event-time predictions.
task_description: 'NeuralSurv is the first deep survival model to incorporate full
  Bayesian uncertainty quantification. The framework uses a sigmoidal hazard function
  combining a Weibull-type baseline hazard with a Bayesian neural network modulation
  component. Inference proceeds via coordinate-ascent variational inference (CAVI)
  with closed-form updates derived through local linearization of the BNN and Pólya-Gamma
  data augmentation. The current packaged snapshot preserves paper metadata, method
  documentation, and metric definitions but does not contain executable source code.
  This entry is intended for paper-backed planning, upstream restoration, or theoretical
  evaluation of the survival analysis route.

  '
