technical_summary:
  problem_domain: 单变量时间序列异常检测（UTS-TSAD）
  input_format: 带异常标签的单变量时间序列 x = [x_0, x_1, ..., x_t]
  core_methodology:
  - 基于Kolmogorov-Arnold网络骨干和重新设计的单变量函数
  - 用截断傅里叶展开替换B样条
  - 基于索引的单变量函数用于细粒度周期性
  - 结合差分以隔离趋势效应
  key_insight: 正常序列比异常具有更强的局部平滑性；将TSAD重新表述为平滑函数逼近可减轻对局部扰动的过拟合
  three_stage_pipeline:
  - mapping: 将输入时间窗口分解为多个单变量函数
  - reducing: 通过学习系数组合函数以重构正常模式
  - projection: 用于异常评分
  evaluation_datasets:
  - 四个公开可用的TSAD基准测试数据集（快照中未保留具体名称）
  baselines_compared:
  - TimesNet
  - Vanilla KAN
  - 其他基于预测的TSAD方法
  - 基于VAE的方法（FCVAE）
