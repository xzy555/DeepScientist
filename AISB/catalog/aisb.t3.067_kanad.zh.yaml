id: aisb.t3.067_kanad
name: 'KAN-AD：基于Kolmogorov-Arnold网络的时间序列异常检测'
version: 0.1.0
one_line: 基于KAN的轻量级时间序列异常检测，采用傅里叶基函数，F1提升15%，推理速度比标准KAN快50%。
task_description: '该基准测试包涵盖使用Kolmogorov-Arnold网络（KAN）和重新设计的单变量函数进行时间序列异常检测（TSAD）。核心创新是用截断傅里叶展开替换B样条基函数（标准KAN使用），解决了KAN对时间序列数据局部扰动的敏感性。该方法将TSAD重新表述为用平滑单变量函数逼近时间序列，利用正常序列比异常具有更强局部平滑性这一洞察。该方法结合了差分以隔离趋势效应，以及基于索引的单变量函数以捕捉细粒度周期性模式。目前本地快照仅保留元数据和审计材料，而非可运行代码；基准测试执行前需要上游恢复可执行源文件。

  '
