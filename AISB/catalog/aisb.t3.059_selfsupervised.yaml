difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a forecasting task centered on relabeling quality and
  ensemble effects rather than new architectures.
not_recommended_when: Do not use this if you need a fully deterministic single-model benchmark or cannot
  run GPU-backed time-series baselines.
