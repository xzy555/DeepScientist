name: 'Not All Data are Good Labels: On the Self-supervised Labeling for Time Series Forecasting'
version: 0.1.0
one_line: Optimize self-supervised relabeling and ensemble training for time-series forecasting backbones.
task_description: This packaged benchmark covers self-supervised relabeling and ensemble training for
  time-series forecasting backbones. The task is to improve forecasting models by relabeling or bootstrapping
  supervision from the model family itself, then validating gains on benchmark datasets.
