recommended_when: 当你需要基于论文进行方法规划、恢复 STaRFormer 序列表征代码路线，或分析 DAReM 在非平稳序列中的作用时可使用本条目。
not_recommended_when: 不要将当前本地包作为可直接运行基准；当前快照未保留可执行模型代码。未完成上游恢复前无法得到有效评估输出。
