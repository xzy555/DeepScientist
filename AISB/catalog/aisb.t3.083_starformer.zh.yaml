  - transformers==4.50.3
  notes:
  - The current local package does not preserve executable setup files or runnable source code; environment hints here should be treated as provisional until upstream restoration.
  - DAReM module requires attention weight extraction per transformer layer for regional mask computation.
  - Semi-supervised CL loss includes hyperparameter lambda_CL for balancing contrastive and task losses.
  - See the bundled README/requirements for the full dependency set.
