id: aisb.t3.083_starformer
name: STaRFormer
version: 0.1.0
one_line: 面向非平稳与不规则采样序列数据的 Transformer 框架，结合动态注意力区域掩码与半监督对比学习。
task_description: STaRFormer 是一个用于真实场景序列表征学习的 Transformer 框架，针对“非平稳+非规则采样”条件设计。其采用仅编码器 Transformer 主干，并结合动态注意力区域掩码（DAReM），对输入序列中任务相关区域进行操作，构造统计性质变化并模拟不同采样频率。训练中引入新的半监督对比学习：同时最大化批内正样本对（同一样本掩码/未掩码嵌入）与类内正样本对（同类样本掩码/未掩码嵌入）的一致性，得到相关潜在表示以提升下游性能。评测覆盖分类、异常检测与回归多类基准。
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: restore_needed
support_level: recovery
time_band: 6-24h
cost_band: medium
difficulty: hard
data_access: restricted
primary_outputs:
- pam_accuracy
- latent_representations
- dare_m_masks
- ablation_reports
launch_profiles:
- id: analysis_only
  label: Analysis Only
  description: Review preserved sequential representation benchmark metadata, paper content, and metric definitions.
- id: restore_first
  label: Restore First
  description: Restore the missing STaRFormer implementation (transformer backbone, DAReM module, semi-supervised CL loss) before attempting benchmark execution.
- id: full_benchmark
  label: Full Benchmark
  description: Execute complete evaluation pipeline including classification, anomaly detection, and regression benchmarks with ablation studies.
dataset_download:
  primary_method: mixed
  sources:
  - name: DKT (Digital Key Trajectory)
    type: custom_restricted
    description: BMW proprietary trajectory dataset from Digital Key use case
  - name: Microsoft spatiotemporal
    type: public
    description: Public real-world dataset from Microsoft for non-stationary sequential data
  - name: Irregularly-sampled benchmark
    type: public
    description: Collection of 3 public datasets with irregular sampling patterns
  - name: UEA time series
    type: public
    description: University of East Anglia benchmark with 30 public datasets for regular time series classification
  - name: Anomaly detection benchmark
    type: public
    description: Public benchmark with 2 datasets for anomaly detection evaluation
  - name: Regression benchmark
    type: public
    description: Public benchmark with 19 datasets for regression evaluation
  notes:
  - The current local package does not preserve an executable benchmark route; treat dataset setup as part of upstream restoration rather than a bundled run path.
  - DKT dataset is proprietary BMW data requiring appropriate access credentials.
  - Public datasets should be downloaded from respective original sources during restoration phase.
credential_requirements:
