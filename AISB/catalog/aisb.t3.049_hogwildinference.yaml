schema_version: 1
id: aisb.t3.049_hogwildinference
name: 'Hogwild! Inference: Parallel LLM Generation via Concurrent Attention'
version: 0.1.0
one_line: Optimize concurrent-cache LLM inference with parallel workers and optional custom fast kernels.
task_description: This packaged benchmark covers parallel LLM generation with a concurrent attention cache
  and optional custom CUDA kernels. The task is to run multi-worker inference or kernel benchmarks from
  the local notebooks and `inference_lib`, then improve generation throughput without breaking correctness
  or stability. The primary staged metric is `tokens_per_second`; the local benchmark code measures kernel
  latency directly and still needs runtime verification to confirm end-to-end throughput.
