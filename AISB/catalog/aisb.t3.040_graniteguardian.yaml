schema_version: 1
id: aisb.t3.040_graniteguardian
name: 'Granite Guardian: Comprehensive LLM Safeguarding'
version: 0.1.0
one_line: Optimize a multi-head LLM safeguard that scores jailbreaks, hallucinations, and other risks
  under configurable criteria.
task_description: This packaged benchmark covers Granite Guardian style LLM safeguarding across harms
  such as jailbreaks, hallucinations, and unsafe responses. The task is to combine or calibrate multiple
  risk heads so that safety detection metrics improve, while the current local package mainly preserves
  cookbook-style usage routes rather than a bundled XSTEST evaluator.
