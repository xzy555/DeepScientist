name: Efficient Training-Free Online Routing for High-Volume Multi-LLM Serving
version: 0.1.0
one_line: Optimize a training-free online router that allocates prompts across multiple LLMs under budget
  constraints.
task_description: This packaged benchmark covers a training-free online router that allocates prompts
  across multiple LLMs under budget constraints. The task is to choose which model should answer each
  query so that overall quality-cost tradeoffs improve without retraining the underlying models.
