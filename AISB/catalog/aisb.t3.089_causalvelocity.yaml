model_specification:
  velocity_families:
  - ANM: m'(x) velocity corresponds to additive noise model
  - PNL: g(g^{-1}(y))m(x) velocity for post-nonlinear SCMs
  - LSNM: m(x) + h(x)(y - m(x)) velocity for location-scale noise models
  - Basis: a^T Φ(y, x) basis expansion velocity
  - Black_box: v(y, x) general velocity function
  estimation_method: score-based regression
  identifiability: general result from dynamical perspective; specializes to existing
    causal discovery identifiability results
  consistency: statistically consistent; convergence rate dictated by score estimator
    convergence
