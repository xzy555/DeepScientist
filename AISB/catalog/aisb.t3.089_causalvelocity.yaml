schema_version: 1
id: aisb.t3.089_causalvelocity
name: Distinguishing Cause from Effect with Causal Velocity Models
version: 0.1.0
one_line: Bivariate causal discovery via velocity-based structural causal models and
  score-based goodness-of-fit testing, extending beyond additive noise and location-scale
  model classes.
task_description: 'This packaged benchmark evaluates causal direction inference using
  velocity-based structural causal models (SCM). The approach treats the cause variable
  as time in a dynamical system, where the causal velocity implicitly defines counterfactual
  curves via initial value problems. The velocity function is recovered from the score
  function using measure transport tools, enabling simulation-free estimation without
  explicit functional model estimation or noise distribution assumptions. The task
  improves benchmark-level causal discovery accuracy in settings where ANM and LSNM
  models fail, requiring nonparametric score estimation of the marginal and joint
  distributions.

  '
