schema_version: 1
id: aisb.t3.017_multimodalglp
name: Synergizing LLMs with Global Label Propagation for Multimodal Fake News Detection
version: 0.1.0
one_line: Optimize multimodal fake-news detection with graph label propagation and LLM-derived pseudo
  labels.
task_description: This packaged benchmark covers multimodal fake-news detection with graph label propagation
  and LLM-derived pseudo labels. The task is to combine textual, visual, and graph-structured evidence
  so that fake-news classification improves under weak or partially labeled supervision.
