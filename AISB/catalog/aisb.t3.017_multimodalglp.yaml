difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want a multimodal graph-learning task with social-media
  data and pseudo-label refinement.
not_recommended_when: Do not use this if you need a tiny text-only benchmark or cannot host multimodal
  benchmark data locally.
