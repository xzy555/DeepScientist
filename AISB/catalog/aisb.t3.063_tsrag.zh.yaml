  cuda: '11.8'
  pytorch: 2.1.0
  flash_attn: null
  key_packages:
  - chronos-forecasting>=1.5.1
  - faiss-gpu>=1.7.2
  - transformers
  - scikit-learn
  - pandas
  - numpy
  - tqdm
  notes:
  - 该工作流依赖于外部检索数据库和预训练的TSFM检查点
  - 完整的依赖项列表请参阅捆绑的requirements.txt
  - FAISS-GPU是检索数据库高效相似度搜索所必需的
  - Chronos管道是默认主干模型所必需的
risk_flags:
- external_dependencies
- large_model_checkpoints
- retrieval_database_required
- no_execution_verification
risk_notes:
- 预训练的基础模型检查点必须单独下载（chronos-bolt、MOMENT）
- 检索数据库必须在运行评估前预先构建或生成
- 打包过程中未执行基准测试；指标值为临时值
- 外部Google Drive链接可能需要手动下载和组织
recommended_when: '在以下情况下使用此基准测试：评估检索增强时间序列预测方法、测试基础模型在多样化领域的零样本泛化能力，或基准测试检索上下文模式对预测精度的贡献（无需微调）。

  '
not_recommended_when: '在以下情况下不要使用此基准测试：无法托管大型检索数据库（FAISS索引）和预训练基础模型检查点；用例仅需要简单的统计基线；或需要在不下载外部资产的情况下获得即时可重复性。

  '
