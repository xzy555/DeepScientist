id: aisb.t3.063_tsrag
name: 'TS-RAG: 基于检索增强生成的时间序列基础模型是更强的零样本预测器'
version: 0.1.0
one_line: 结合时间序列基础模型与知识库的检索增强零样本预测框架，采用自适应检索混合器实现跨领域泛化预测。
task_description: '该基准测试实现了TS-RAG，一种用于时间序列预测的检索增强生成框架，旨在增强时间序列基础模型（TSFMs）的泛化能力和可解释性。该框架由三个关键组件构成：（1）预训练的时间序列基础模型（TSFM）作为主干预测器；（2）检索器，用于查询专用知识库以查找语义相关的时间序列片段及其未来趋势；（3）可学习的自适应检索混合器（ARM）模块，用于动态融合检索到的模式与TSFM的内部表示。给定输入序列，检索器找到top-k个相似上下文，通过ARM模块进行嵌入和组合，模块自适应分配重要性分数。统一表示被传递到基础模型的输出层，以产生增强的预测结果，无需任务特定的微调。支持chronos-bolt作为主要主干模型。

  '
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: advanced
time_band: 1d+
cost_band: high
difficulty: hard
data_access: public
primary_outputs:
- mae
- mse
- retrieval_database
- forecast_report
launch_profiles:
- id: quick_eval
  label: 快速评估
  description: 在已准备的检索数据库上，使用单一主干模型配置运行一个打包的TS-RAG零样本脚本。
- id: full_rag_eval
  label: 完整RAG评估
  description: 运行完整的检索增强零样本预测工作流，包括检索数据库构建、ARM混合和多数据集评估。
dataset_download:
  primary_method: mixed
  sources:
  - url: https://drive.google.com/drive/folders/12wesXfVwFhdrUY5Kv8yuAWWqN9M77irw
    type: google_drive
    description: 预处理后的数据集和预训练模型
  - url: https://huggingface.co/nkh/TS-RAG-Data
    type: huggingface
    description: HuggingFace Hub上的备用镜像
  notes:
  - 运行评估脚本前需下载所有数据集和模型检查点
  - 预期目录结构包括datasets/、retrieval_database/和TS-RAG/checkpoints/
  - 数据集包括ETT-small、weather、electricity、traffic、exchange_rate和illness
