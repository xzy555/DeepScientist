operational_notes: |
  执行流程：
  1. 将预训练权重放入weights/目录（FCNet.pth、i3d_rgb_imagenet.pth）
  2. 在rgvi.py中配置Stable Diffusion修复路径（默认：/sd2_inpaint）
  3. 推理：python run.py --root <数据集路径> --res <240p|480p|2K> --seq <序列名>
  4. 评估：python post.py --root <数据集路径> --res <分辨率>

  分辨率支持：240p（快速评估）、480p（平衡）、2K（高质量）
  预计算基线可用于对比，无需完整重跑
  LPIPS和I3D模型在启动时加载；首次推理可能较慢
verification_checklist: |
  执行前请验证：
  - [ ] 测试数据集选择（HQVI、DAVIS、DAVI、YTVI）
  - [ ] GPU可用性和CUDA配置
  - [ ] 输入分辨率选择（240p/480p/2K）
  - [ ] 生成模式的文本提示词（可选）
  - [ ] 预训练模型路径（SDI、FCNet、I3D）
  - [ ] post.py的数据集根目录指定
  - [ ] 输出有足够的磁盘空间
