task_description: This packaged benchmark covers speculative decoding kernels and tree-shape controls
  for faster large-vocabulary LLM inference. The task is to improve latency and throughput through speculation
  strategy, cache behavior, or CUDA-level optimization while keeping generation quality and acceptance
  rates stable.
