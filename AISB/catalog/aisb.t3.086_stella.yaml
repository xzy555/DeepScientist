  label: Analysis Only
  description: Review preserved atmospheric forecasting benchmark metadata, paper
    references, and architecture documentation without executing code.
- id: restore_first
  label: Restore Then Evaluate
  description: Restore STELLA source implementation from upstream GitHub repository
    before attempting training or evaluation runs. Code restoration from https://github.com/GestaltCogTeam/STELLA
    is a prerequisite.
