id: aisb.t3.086_stella
name: 'STELLA: Spatial-Temporal Knowledge Embedded Lightweight Model for Atmospheric
  Time Series Forecasting'
version: 0.1.0
one_line: Lightweight atmospheric time-series forecasting via spatial-temporal position
  embeddings and MLP, challenging Transformer-complexity assumptions.
task_description: 'This packaged benchmark covers STELLA, a lightweight atmospheric
  time-series forecasting model that replaces Transformer attention stacks with spatial-temporal
  position embeddings (STPE) combined with a simple MLP. The core insight is that
  geographical coordinates and temporal features—intrinsically linked to atmospheric
  dynamics—are sufficient to capture spatial-temporal correlations without heavy attention
  mechanisms. The current local snapshot preserves paper metadata and references but
  lacks executable training and evaluation code; full restoration from the upstream
  GitHub repository is required before benchmark execution is possible.

  '
task_mode: analysis_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: restore_needed
support_level: recovery
time_band: 2-6h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- test_mae
- test_rmse
launch_profiles:
