executive_summary: '该基准测试为LLM输出中的集成水印检测提供了一个全面的评估框架。该方法结合令牌级（红绿）、句子级（藏头诗）和语义级（感觉运动）水印特征，以在改写攻击后仍能实现鲁棒检测。统一检测函数可在所有特征组合上运行，支持不同安全-鲁棒性权衡的灵活配置。

'
