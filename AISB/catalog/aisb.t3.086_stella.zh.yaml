id: aisb.t3.086_stella
name: STELLA：用于大气时间序列预测的时空知识嵌入式轻量级模型
version: 0.1.0
one_line: 通过时空位置嵌入和 MLP 进行轻量级大气时间序列预测，挑战 Transformer 复杂性假设。
task_description: 这个打包的基准测试涵盖了 STELLA，这是一种轻量级大气时间序列预测模型，它用时空位置嵌入 (STPE) 与简单的 MLP 相结合取代了 Transformer 注意力堆栈。核心见解是地理坐标和时间特征（与大气动力学本质上相关）足以捕获时空相关性，而无需大量关注机制。当前的本地快照保留了论文元数据和参考文献，但缺乏可执行的培训和评估代码；在执行基准测试之前，需要从上游 GitHub 存储库进行完全恢复。
task_mode: analysis_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: restore_needed
support_level: recovery
time_band: 2-6h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- test_mae
- test_rmse
launch_profiles:
- id: analysis_only
  label: 仅分析
  description: 在不执行代码的情况下查看保存的大气预报基准元数据、论文参考文献和架构文档。
- id: restore_first
  label: 恢复然后评估
  description: 在尝试训练或评估运行之前，从上游 GitHub 存储库恢复 STELLA 源实现。从 https://github.com/GestaltCogTeam/STELLA 恢复代码是先决条件。
dataset_download:
  primary_method: pending_restoration
  sources:
  - type: upstream_repository
    url: https://github.com/GestaltCogTeam/STELLA
    notes: Source code and datasets referenced in paper require restoration from upstream; not bundled in current snapshot.
  - type: paper_reference
    url: https://arxiv.org/abs/2408.09695
    notes: Full paper with dataset descriptions for GlobalWind, PEMS-BAY, and three additional atmospheric datasets.
  notes:
  - 当前本地快照不保留可执行的基准路由；数据集设置是上游恢复的一部分。
  - Five datasets referenced: 来自气象站网络的一份合成数据和四份真实世界大气测量数据集。
  - 将数据集获取视为已阻止，直到源恢复完成。
credential_requirements:
  mode: none
  items: []
  notes:
  - 公共基准；纸质访问无需身份验证。
  - 源恢复阶段需要 GitHub 访问权限。
