    ram_gb: 64
    disk_gb: 150
    gpu_count: 1
    gpu_vram_gb: 24
    gpu_arch: ampere+
    network: required_for_restore
environment:
  python: '3.9'
  cuda: '11.1'
  pytorch: 1.10.0
  flash_attn: null
  key_packages:
  - pytorch
  - numpy
  - pandas
  - scipy
  notes:
  - 环境规范是暂定的；源自纸张依赖性，并且不由保留的设置文件锚定。
  - 当前本地快照缺少可执行环境配置；将 Python/pytorch/cuda 提示作为恢复目标的参考。
  - 恢复后确认上游 requirements.txt 的确切依赖版本。
risk_flags:
- source_snapshot_incomplete
- route_caveat
- no_execution_anchor
risk_notes:
- 当前快照不保留任何可执行代码文件；两个主要指标（test_mae、test_rmse）都是无代码阻止的。
- 在此打包过程中未执行任何基准测试。
- 当前快照中缺少顶级自述文件；需要从 GitHub 恢复。
- Code-bearing roots: 当前快照中未检测到任何内容。
- Static code-audit status: 阻止无代码。
- 恢复评估协议时，优先选择现有代码文件而不是仅自述文件声明。
recommended_when: 使用此条目进行 STELLA 大气预报路线的纸质分析和规划，或者在评估挑战 Transformer 复杂性假设的时空预测任务的轻量级模型架构时。当源恢复工作流程是下一个操作时，适用于执行前分析。
not_recommended_when: 不要将此本地包视为准备运行的预测基准。在未先从上游 GitHub 存储库完成源恢复之前，请勿尝试执行基准测试。分阶段快照中缺少可执行的训练和评估代码；执行尝试将会失败。
