  role: 主要配置文件
  contains:
  - 采样参数：batch_size=256, sampling_size=1000, last_only=True
  - 测试参数：batch_size=256, n_z_samples=200, n_bins=10, minisample=1
  - 覆盖率与NLL跟踪参数
- path: notebooks/uncertainty_variation.ipynb
  role: 分析笔记本锚点
- path: configs/csbi.yaml
  role: 附加配置（非主要）
- path: configs/tmdm.yml
  role: 附加配置（非主要）
