execution_evidence:
  pretrain_script: bash ./scripts/pretrain_F/ETTh1.sh
  main_entry: python3 ./src/experiments/NsDiff.py
  example_args:
  - --dataset_type=ETTh1
  - --device=cuda:0
  - --batch_size=32
  - --horizon=1
  - --pred_len=192
  - --windows=168
  - --load_pretrain=True
  notes:
  - 执行期间必须将PYTHONPATH设置为项目根目录。
  - 多GPU设置建议使用CUDA_DEVICE_ORDER=PCI_BUS_ID。
  - seeds参数接受列表格式：--seeds='[1232132, 3]'
  - --load_pretrain=False选项可用于非预训练运行。
config_anchors:
