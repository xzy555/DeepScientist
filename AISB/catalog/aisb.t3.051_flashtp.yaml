launch_profiles:
- id: microbenchmark
  label: Microbenchmark
  description: 'Run example/benchmark_timing.py on a single IR config to measure forward,
    backward, and double-backward kernel latency. Fastest route; completes in minutes
    per config.

    '
- id: full_eval
  label: Full Eval
  description: 'Run benchmarks across all bundled IR configs (NequIP, MACE, SevenNet)
    with multiple edge counts and data types to produce a comprehensive kernel performance
    profile.

    '
- id: smoke_test
  label: Smoke Test
  description: 'Run example/test.sh to verify that the CUDA extension compiles and
    the FlashTP kernel produces correct output on one NequIP config (4_32_3_p_sc,
    32768 edges, fp32).

    '
dataset_download:
  primary_method: none
  sources: []
  notes:
  - No external dataset download is required. All IR configs for microbenchmarking
    are bundled in ir_config/.
  - Edge graphs are synthetically generated at runtime by flashTP_e3nn.utils.fixed_generate_edgepair.
credential_requirements:
  mode: none
  items: []
  notes: []
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 50
    gpu_count: 1
    gpu_vram_gb: 24
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 120
    gpu_count: 1
    gpu_vram_gb: 80
environment:
  python: '3.10'
  cuda: '12'
  pytorch: 2.4.1
  key_packages:
  - e3nn==0.6.6
  - torch_scatter
  notes:
  - The README explicitly requires CUDA Toolkit 12 or higher.
  - Python 3.11 is mentioned as non-strict; 3.10+ should work.
  - Compiling custom CUDA kernels takes up to 10 minutes during pip install.
  - Default CUDA_ARCH_LIST targets sm_80 (A100) and sm_90 (H100). Set CUDA_ARCH_LIST
    to match your GPU.
  - torch_scatter is required for accurate e3nn reference benchmarks.
  - See requirements.txt and pyproject.toml for the full dependency set.
risk_flags:
- custom_cuda_compilation
- gpu_architecture_dependency
risk_notes:
- CUDA extensions must compile from source; compilation failure on unsupported architectures
  is a common failure mode.
- Default build targets A100/H100 only. Other GPUs require setting CUDA_ARCH_LIST
  to the correct compute capability.
- No benchmark execution was performed in the packaging pass; metric values should
  be verified at runtime.
- The e3nn reference implementation is used for numerical correctness checks; mismatched
  e3nn versions may cause subtle differences.
recommended_when: 'Use this benchmark when you want a self-contained CUDA-kernel optimization
  task focused on equivariant tensor-product operations in atomistic ML workloads.
  Ideal for evaluating kernel fusion, sparsity exploitation, and GPU memory optimization
  strategies on a well-defined microbenchmark with forward/backward/double-backward
  phases.

  '
not_recommended_when: 'Do not use this if you cannot compile custom CUDA extensions,
  lack an NVIDIA GPU with compute capability 8.0+, or need a high-level application
  benchmark with end-to-end MD simulation evaluation. Not suitable for CPU-only environments.

  '
