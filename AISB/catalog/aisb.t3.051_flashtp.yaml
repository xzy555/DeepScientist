schema_version: 1
id: aisb.t3.051_flashtp
name: 'FlashTP: Fused, Sparsity-Aware Tensor Product for Machine Learning Interatomic
  Potentials'
version: 0.1.0
one_line: 'Benchmark and optimize fused, sparsity-aware CUDA tensor-product kernels
  that accelerate equivariant machine-learning interatomic potentials (MLIPs), measuring
  forward, backward, and double-backward kernel latency in milliseconds.

  '
task_description: 'This benchmark evaluates CUDA kernel performance for the Tensor-Product
  layer used in equivariant machine-learning interatomic potentials (MLIPs). The Tensor-Product
  layer is the dominant computational bottleneck in equivariant MLIP models such as
  SevenNet, accounting for up to 89% of inference time and 75% of training time. FlashTP
  addresses this by fusing all kernels within the Tensor-Product layer and its subsequent
  reduce layer into a single kernel, exploiting the high sparsity (71–86%) of the
  Clebsch-Gordan coefficient matrix, and introducing path-aggregated execution to
  increase input reuse.

  The evaluation route is self-contained: run `example/benchmark_timing.py` with IR
  configs from `ir_config/` (NequIP, MACE, SevenNet configurations are bundled). The
  script times forward, backward, and double-backward passes using CUDA events (50
  warmup iterations, 200 timed iterations) and reports per-iteration latency in milliseconds.
  A simpler smoke test is available via `example/test.sh`. No external datasets, credentials,
  or evaluation servers are required. Custom CUDA extensions must be compiled from
  source (`pip install . --no-build-isolation`), which takes up to 10 minutes. By
  default, kernels are compiled for NVIDIA A100 (sm_80) and H100 (sm_90); set `CUDA_ARCH_LIST`
  to target other architectures.

  The optimization task is to improve kernel throughput (lower forward_ms, backward_ms,
  double_backward_ms) without violating numerical correctness against the reference
  e3nn TensorProduct implementation.

  '
