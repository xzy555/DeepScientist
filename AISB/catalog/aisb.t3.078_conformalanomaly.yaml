id: aisb.t3.078_conformalanomaly
name: CADES - Conformal Anomaly Detection in Event Sequences
version: 0.1.0
one_line: Statistical anomaly detection framework for continuous-time event sequences
  with finite-sample FPR control via conformal inference.
task_description: 'This benchmark entry covers CADES (Conformal Anomaly Detection
  in Event Sequences), an ICML 2025 method that applies conformal inference to detect
  anomalous event sequences generated by temporal point processes. The method uses
  the time-rescaling theorem to design two complementary non-conformity scores that
  address non-identifiability issues of prior test statistics (e.g., KS statistic,
  sum-of-squared-spacings). CADES combines these scores with Bonferroni correction
  and provides both marginal and calibration-conditional FPR guarantees. The current
  local snapshot preserves paper metadata and metric definitions only; executable
  source code has not been packaged and requires upstream restoration before evaluation.

  '
