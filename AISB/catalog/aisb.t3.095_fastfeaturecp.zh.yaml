id: aisb.t3.095_fastfeaturecp
name: 快速特征共形预测
version: 0.1.0
one_line: 通过非线性带变换的泰勒近似，将特征空间共形预测加速约 50 倍。
task_description: 该打包基准测试提供快速特征共形预测 (FFCP)，这是特征共形预测 (FCP) 的泰勒展开近似，可显着减少计算开销。 FFCP 引入了一种新颖的不合格分数 s_ff，避免了 FCP 将置信带从特征空间转换到输出空间所需的昂贵的非线性操作。该方法是事后的、不受分布影响且与模型无关。它适用于回归（带长度最小化）和分类（预测集大小）任务。用户校准预训练的基础模型，然后构建保形置信带，并在指定的置信水平下保证覆盖范围。
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 2-6h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- band_length
- coverage_pct
- conformal_prediction_sets
launch_profiles:
- id: ffcp_regression
  label: FFCP回归
  description: 运行一维和高维综合回归评估。脚本：FastFeatureCP/main.py。支持 com (1D) 和 x100-y10-reg（合成）数据集。
- id: ffcp_cqr
  label: FFCP 分位数回归 (FFCQR)
  description: 运行快速特征保形分位数回归评估。脚本：FastFeatureCQR/main_FFCQR.py。将 FFCP 概念与非对称不确定性边界的分位数回归相结合。
- id: ffcp_classification
  label: FFCP 分类 (FFRAPS)
  description: 运行快速特征正则化自适应预测集以进行 ImageNet 分类。脚本：FastFeatureRAPS/main_FFRaps.py。需要 --data 指向 ImageNet 验证集。
- id: ffcp_segmentation
  label: FFCP 细分
  description: 在城市景观上运行快速特征共形预测以进行语义分割。脚本：FastFeatureCP_seg/main_fcn.py。需要 CITYSCAPES_PATH 环境变量。
dataset_download:
  primary_method: mixed
  sources:
  - type: public_url
    url: https://deepscientist.cc/AISB/095_fastfeaturecp
    note: Benchmark archive with bundled synthetic datasets
  - type: external
    name: ImageNet Val
    note: Required for FFRAPS classification variant; user must obtain separately
  - type: external
    name: Cityscapes
    note: Required for segmentation variant; user must obtain separately
  notes:
  - 综合回归数据集（com、x100-y10-reg）捆绑在存档中
  - 真实世界数据集（ImageNet、Cityscapes）需要根据各自的许可证单独下载
credential_requirements:
  mode: none
  items: []
  notes: []
resources:
  minimum:
    cpu_cores: 8
    ram_gb: 32
    disk_gb: 50
    gpu_count: 1
    gpu_vram_gb: 12
    gpu_architecture: pascal_or_newer
  recommended:
    cpu_cores: 16
    ram_gb: 64
    disk_gb: 100
    gpu_count: 1
    gpu_vram_gb: 24
    gpu_architecture: ampere_or_newer
environment:
  python: '3.8'
  cuda: '11.6'
  pytorch: 1.12.1
  flash_attn: null
  key_packages:
  - numpy
  - pandas
  - torch
  - torchvision
  - scikit-learn
  - tqdm
  - matplotlib
  - pillow
  notes:
  - 捆绑的 requirements.txt 中指定的完整依赖项集
  - 强烈建议使用 GPU 进行分割和 ImageNet 分类变体
  - 仅 CPU 可接受，仅适用于一维综合回归
risk_flags:
- no_runtime_execution_in_packaging_pass
risk_notes:
- 静态代码审核确认所有阶段指标都存在可执行锚点
- Band_length 和 coverage_pct 由 FastFeatureCP/main.py 支持
- 建议在信任输出值之前进行运行时验证
recommended_when: 使用此基准对预训练模型进行事后不确定性量化。当您需要 (1) 比标准 FCP 更快的保形预测，(2) 保证覆盖范围且预测带比 Vanilla CP 更短，(3) 回归和分类变体，或 (4) 无需重新训练的模型无关校准时，它是理想的选择。
not_recommended_when: 如果您需要从头开始进行端到端模型训练而不是事后保形校准，请不要使用此基准。对于生产部署，请注意 Cityscapes 和 ImageNet 变体需要单独的数据集获取。
paper:
  title: Accelerating Feature Conformal Prediction via Taylor Approximation
  venue: NeurIPS 2025
  year: 2025
  url: https://arxiv.org/abs/2412.00653
  github: https://github.com/ElvisWang1111/FastFeatureCP
  authors:
