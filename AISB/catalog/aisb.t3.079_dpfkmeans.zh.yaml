id: aisb.t3.079_dpfkmeans
name: Differentially Private Federated k-Means Clustering with Server-Side Data
version: 0.1.0
one_line: 带差分隐私保证的联邦 k-means 聚类方法，利用服务器侧辅助数据进行初始化。
task_description: 该基准覆盖 FedDP-KMeans，一种完全联邦且满足差分隐私的 k-means 算法。方法将 FedDP-Init（利用可能较小且分布外的服务器侧数据进行初始化）与 FedDP-Lloyd’s（Lloyd 算法的联邦变体）结合，解决差分隐私聚类中的核心难点：在隐私约束下获得高质量初始化。当前本地快照需先恢复上游源码后方可运行；本次分阶段打包未检测到可执行代码锚点。
