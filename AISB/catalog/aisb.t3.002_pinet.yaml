schema_version: 1
id: aisb.t3.002_pinet
name: 'PINet: Optimizing hard-constrained neural networks with orthogonal projection layers'
version: 0.1.0
one_line: Optimize feasible-by-design constrained neural layers with small-QP projection routines in JAX.
task_description: This packaged benchmark covers PI-Net style constrained neural layers implemented in
  JAX. The task is to train models that satisfy feasibility constraints through small quadratic-program
  projection steps during the forward pass, then measure predictive quality together with constraint satisfaction
  on the target problems.
capability_tags:
- research_code_optimization
- constrained_optimization
- jax
