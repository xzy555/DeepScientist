requires_paper: true
integrity_level: cas_plus_canary
cost_band: low
time_band: 1-2h
difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a constrained-learning task that can still be reproduced
  on CPU-only hardware.
not_recommended_when: Do not use this if you specifically need a large-scale vision, language, or multimodal
  training benchmark.
