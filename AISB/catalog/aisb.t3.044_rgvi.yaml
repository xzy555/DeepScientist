operational_notes: 'Execution workflow:

  1. Place pretrained weights in weights/ directory (FCNet.pth, i3d_rgb_imagenet.pth)

  2. Configure Stable Diffusion Inpainting path in rgvi.py (default: /sd2_inpaint)

  3. For inference: python run.py --root <dataset_path> --res <240p|480p|2K> --seq
  <sequence_name>

  4. For evaluation: python post.py --root <dataset_path> --res <resolution>


  Resolution support: 240p (fast evaluation), 480p (balanced), 2K (high-quality)

  Pre-computed baselines available for comparison without full re-runs

  LPIPS and I3D models loaded at startup; first inference may be slow

  '
verification_checklist: 'Before execution, verify:

  - [ ] Testing dataset selection (HQVI, DAVIS, DAVI, YTVI)

  - [ ] GPU availability and CUDA configuration

  - [ ] Input resolution selection (240p/480p/2K)

  - [ ] Text prompt for generation mode (optional)

  - [ ] Pre-trained model paths (SDI, FCNet, I3D)

  - [ ] Dataset root directory specification for post.py

  - [ ] Sufficient disk space for outputs

  '
