metric_definitions:
- id: harrell_c_index
  name: Harrell's C-index
  type: discriminative_performance
  description: 'Concordance index measuring the model''s ability to correctly rank pairs of patients based on predicted risk scores. Higher values indicate better discriminative ability. Range approximately 0.5 to 1.0; 0.5 indicates no discriminative ability, 1.0 indicates perfect.

    '
  blocked: true
  execution_note: Metric definition preserved; no executable code anchor in current snapshot.
- id: survival_calibration_metrics
  name: Survival Calibration Metrics
  type: calibration
  description: 'Metrics assessing the alignment between predicted survival probabilities and observed event rates. The paper emphasizes superior calibration compared to state-of-the-art deep survival models as a key contribution.

    '
  blocked: true
  execution_note: Calibration evaluation described in paper experiments; restoration required.
- id: posterior_credible_intervals
  name: Posterior Credible Intervals
  type: uncertainty_quantification
  description: 'Bayesian credible intervals for individual survival functions derived from the variational posterior. Communicate model confidence in predictions.

    '
  blocked: true
  execution_note: Uncertainty quantification is a core contribution; implementation restoration needed.
