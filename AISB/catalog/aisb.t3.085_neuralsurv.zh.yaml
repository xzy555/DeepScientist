id: aisb.t3.085_neuralsurv
name: 'NeuralSurv: Deep Survival Analysis with Bayesian Uncertainty Quantification'
version: 0.1.0
one_line: 采用 CAVI 推断、sigmoidal hazard 建模和不确定性感知事件时间预测的贝叶斯深度生存分析方法。
task_description: NeuralSurv 是首个引入完整贝叶斯不确定性量化的深度生存模型。框架采用 sigmoidal hazard 函数，将 Weibull 型基线风险与贝叶斯神经网络调制项结合。推断通过坐标上升变分推断（CAVI）进行，并借助对 BNN 的局部线性化与 Pólya-Gamma 数据增广得到闭式更新。当前打包快照保留论文元数据、方法文档与指标定义，但不含可执行源码。该条目适用于基于论文的规划、上游恢复，或生存分析路线的理论评估。
task_mode: analysis_driven
requires_execution: true
requires_paper: true
