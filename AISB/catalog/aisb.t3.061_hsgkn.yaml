schema_version: 1
id: aisb.t3.061_hsgkn
name: Hierarchical Shortest-Path Graph Kernel Network
version: 0.1.0
one_line: Optimize a graph-kernel network that fuses shortest-path structure with
  learnable graph representations for graph classification.
task_description: 'This packaged benchmark covers the Hierarchical Shortest-Path Graph
  Kernel Network (HSP-GKN), a kernel-based graph learning framework that integrates
  graph similarity estimation with downstream tasks within a unified optimization
  framework. The approach designs a hierarchical shortest-path graph kernel that efficiently
  preserves both semantic and structural information by transforming graphs into hierarchical
  features. These features are matched against learnable hidden graph features to
  produce a similarity vector serving as the graph embedding for end-to-end MLP training.
  Unlike traditional graph kernel methods that isolate representation learning from
  objective optimization, HSP-GKN enables task-specific representation learning with
  computational complexity of O(n² log n) compared to O(n⁴) for standard SP kernels.

  '
capability_tags:
- research_code_optimization
- graph_learning
- graph_kernels
- classification
- explainable_ml
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 2-6h
cost_band: medium
difficulty: medium
data_access: public
primary_outputs:
- imdb_binary_accuracy
- graph_kernel_checkpoint
- optuna_results
launch_profiles:
- id: quick_eval
  label: Quick Eval
  description: 'Run the packaged graph-classification benchmark route directly from
    main.py. Uses default or provided dataset with GPU acceleration. Default dataset
    is MUTAG. Example: python main.py --dataset MUTAG --device cuda:0

    '
- id: tune_and_eval
  label: Tune + Eval
  description: 'Run the packaged HSGKN training flow together with Optuna hyperparameter
    search. Execute optuna_main.py to perform automated hyperparameter optimization
    across learning rate, weight decay, hidden path count, normalization, cutoff,
    dropout, and attribute normalization parameters.

    '
dataset_download:
  primary_method: bundled
  sources: []
  notes:
  - Graph datasets are automatically downloaded via DGL's TUDataset interface
  - Supported datasets: PROTEINS, PROTEINS_full, ENZYMES, SYNTHETIC, BZR, COX2, NCI1,
      MUTAG, IMDB-BINARY, IMDB-MULTI, COLLAB, DD, REDDIT-BINARY, REDDID-MULTI-5K,
      REDDIT-MULTI-12K, PTC_MR, reddit_threads, SYNTHETICnew
  - Cached datasets stored in cache/ directory after first download
