risk_flags: []
risk_notes: []
recommended_when: 'Use this benchmark when you need a graph-classification task that
  combines kernel-style structural priors with trainable neural components. Particularly
  suitable for researchers exploring the integration of explicit graph kernels with
  end-to-end learning frameworks, or those benchmarking against traditional kernel
  methods on TU graph datasets.

  '
not_recommended_when: 'Do not use this if you need a giant multimodal or LLM benchmark,
  or if your dataset consists primarily of large-scale graphs where the O(n² log n)
  kernel computation may become a bottleneck.

  '
