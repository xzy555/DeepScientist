data_access: public
recommended_when: Use this benchmark when you want an inference-acceleration task for 7B-plus LLMs without
  training an extra draft model.
not_recommended_when: Do not use this if you lack a modern GPU for serving open-weight LLMs or if you
  need a training-centric benchmark.
