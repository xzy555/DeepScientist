schema_version: 1
id: aisb.t3.021_tokenrecycling
name: 'Turning Trash into Treasure: Accelerating Inference of Large Language Models with Token Recycling'
version: 0.1.0
one_line: Optimize retrieval-free speculative decoding by recycling candidate tokens during LLM inference.
task_description: This packaged benchmark covers retrieval-free speculative decoding that recycles candidate
  tokens during LLM inference. The task is to improve inference speed by reusing previously proposed tokens
  and acceptance structure without harming answer quality on the evaluation suite.
