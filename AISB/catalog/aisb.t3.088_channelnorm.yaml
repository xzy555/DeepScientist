id: aisb.t3.088_channelnorm
name: Channel Normalization for Time Series Channel Identification
version: 0.1.0
one_line: Channel-specific affine normalization to enhance channel identifiability
  in time-series forecasting models.
task_description: 'This benchmark entry covers Channel Normalization (CN), a normalization
  strategy that assigns distinct affine transformation parameters to each channel
  in time-series models, enabling channel identifiability (CID). The current local
  snapshot preserves paper metadata and latex source but does not contain executable
  benchmark code or runnable evaluation scripts. The packaged benchmark is intended
  for paper-backed planning and upstream restoration of the CN forecasting implementation.
  Two variants are proposed: Adaptive CN (ACN) dynamically adjusts parameters based
  on input time series, while Prototypical CN (PCN) uses learnable prototypes to handle
  datasets with unknown or varying numbers of channels, facilitating use in time-series
  foundation models.

  '
