- CPU-bound execution eliminates GPU availability risk
- Long runtime (up to 6h) but low computational cost
recommended_when: 当你需要评估在无梯度条件下工作的概率推断方法时使用本基准，包括离散变量模型、无似然推断与不可微后验。其 CPU 友好配置也适合资源受限环境中的变分推断研究。
not_recommended_when: 不适用于评估大规模深度学习、GPU 加速神经网络训练，或需要目标密度自动微分的任务。它也不覆盖重参数化技巧或 score-function 估计等梯度型 VI 方案。
