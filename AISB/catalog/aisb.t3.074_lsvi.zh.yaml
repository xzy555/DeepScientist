id: aisb.t3.074_lsvi
name: Least Squares Variational Inference
version: 0.1.0
one_line: 通过对温度化对数目标评估做最小二乘更新实现无梯度变分推断，支持高斯 BBVI 与指数族后验，无需梯度估计器。
task_description: 该基准封装了 LSVI（最小二乘变分推断），一种在指数族中进行变分推断的无梯度蒙特卡洛方法。LSVI 不做梯度优化，而是在变分近似分布下对温度化对数目标进行连续 OLS 回归。每次迭代通过 OLS 求解不动点方程，得到偏差校正的随机自然梯度下降步。该方法适用于无法获得 log pi 梯度的场景（如离散分布或无似然推断），可避免不稳定梯度估计器。基准包含无需 Fisher 信息矩阵求逆的高斯变分族实现：均值场 O(d)，全协方差 O(d^3)。主要评测任务为 Pima Indians 糖尿病逻辑回归，使用 kl_objective 衡量与真实后验的 KL 散度。
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable
support_level: turnkey
time_band: 2-6h
cost_band: low
difficulty: medium
data_access: public
