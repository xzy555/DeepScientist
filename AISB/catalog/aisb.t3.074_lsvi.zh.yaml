  label: 高斯逻辑回归
  description: 在 Pima Indians 糖尿病二分类任务上运行封装的最小二乘变分推断实验。使用 8 个随机种子，阶段一 8000 步、阶段二 1500 步优化，输出 KL 散度与变分参数轨迹。
