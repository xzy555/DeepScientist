one_line: Optimize process reward model data construction and verifier calibration for mathematical reasoning.
task_description: This packaged benchmark covers process reward model data construction and verifier calibration
  for mathematical reasoning. The task is to build higher-quality intermediate supervision for reasoning
  traces, calibrate the verifier or reward signal, and improve process-level judgment quality on math
  reasoning benchmarks.
