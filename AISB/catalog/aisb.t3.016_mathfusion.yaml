    access: public
    note: Load the data from [MathFusionQA](https://huggingface.co/datasets/QizhiPei/MathFusionQA), then
      convert each split to `.json` file according to [LLaMA-Factory](https://github.com/hiyouga/LLaMA-Factory).
      The training pr...
