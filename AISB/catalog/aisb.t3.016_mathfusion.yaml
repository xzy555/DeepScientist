risk_flags: []
risk_notes: []
recommended_when: Use this benchmark when you want a full-parameter math SFT route with dataset synthesis,
  model training, and six-benchmark evaluation.
not_recommended_when: Do not use this if you only need inference-only prompting or cannot support long-context
  full-parameter SFT plus external math evaluation harnesses.
