schema_version: 1
id: aisb.t3.016_mathfusion
name: 'MathFusion: Enhancing Mathematical Problem-solving of LLM through Instruction Fusion'
version: 0.1.0
one_line: Optimize instruction-fused math reasoning models and evaluation prompts for 7B to 8B LLM backbones.
task_description: This packaged benchmark covers MathFusion's instruction-fusion pipeline for mathematical
  reasoning models. The task is to train a 7B to 8B base model on MathFusionQA using the sequential, parallel,
  and conditional fusion data splits, then evaluate the resulting model with the included Qwen2.5-Math
  and DART-Math-based scripts across math reasoning benchmarks. The primary staged metric is benchmark
  accuracy.
