id: aisb.t3.083_starformer
name: STaRFormer
version: 0.1.0
one_line: Transformer framework with dynamic attention-based regional masking and
  semi-supervised contrastive learning for non-stationary, irregularly-sampled sequential
  data.
task_description: 'STaRFormer is a transformer-based framework designed for robust
  sequential representation learning under real-world conditions where standard assumptions
  of stationarity and regular sampling do not hold. The architecture employs an encoder-only
  transformer backbone combined with Dynamic Attention-Based Regional Masking (DAReM),
  which manipulates task-specific regions within input sequences to introduce synthetic
  variations in statistical properties and simulate varying sampling frequencies.
  The training process incorporates a novel semi-supervised contrastive learning approach
  that maximizes agreement between batch-wise positive pairs (masked and unmasked
  embeddings of the same input) and class-wise positive pairs (masked and unmasked
  embeddings of the same class), producing two correlated latent representations that
  enhance downstream task performance. Evaluation spans classification on spatiotemporal
  and non-stationary benchmarks (DKT and Microsoft datasets), irregularly-sampled
  benchmarks (3 public datasets), and regular time series (UEA, 30 datasets), plus
  anomaly detection (2 datasets) and regression (19 datasets) against 6 and 15 baseline
  models respectively.

  '
