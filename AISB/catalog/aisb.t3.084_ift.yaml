name: Towards Accurate Time Series Forecasting via Implicit Decoding
version: 0.1.0
one_line: Optimize implicit decoding modules that improve the forecasting phase of time-series transformers.
task_description: This packaged benchmark is intended to cover implicit decoding for time-series forecasting
  on top of transformer encoders. The task itself is to improve the decoder-side forecasting route and
  evaluate forecasting quality with MSE and MAE on standard time-series datasets, but the current local
  snapshot preserves only metadata and audit files. This entry therefore needs upstream source restoration
  before it becomes a runnable benchmark again.
