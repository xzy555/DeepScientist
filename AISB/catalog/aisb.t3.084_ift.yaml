risk_notes:
- The current local package contains only metadata and metric-contract files; code, README, and launcher
  scripts are absent.
- The NeurIPS paper reports experiments on a 16-core AMD EPYC 9654 CPU and a single NVIDIA RTX 4090 GPU,
  but those scripts are not preserved in this snapshot.
- Use this entry for paper-backed planning or upstream rehydration rather than as a ready-to-run local
  benchmark.
recommended_when: Use this benchmark when you want to study the paper-backed forecasting-decoder design
  and are willing to restore the upstream codebase first.
not_recommended_when: Do not use this as a ready-to-run local benchmark until the upstream GitHub source
  is restored into the packaged snapshot.
