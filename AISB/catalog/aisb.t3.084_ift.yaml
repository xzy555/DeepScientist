id: aisb.t3.084_ift
name: Towards Accurate Time Series Forecasting via Implicit Decoding
version: 0.1.0
one_line: Paper-backed time-series decoder optimization using implicit frequency-based
  forecasting modules, currently requiring upstream source restoration.
task_description: 'This benchmark entry covers the Implicit Forecaster (IF) method
  from a NeurIPS 2025 paper, which replaces the output MLP layers of existing time-series
  transformer encoders with a novel frequency-domain decoding module. Instead of independent
  pointwise predictions, IF globally forms forecasts by predicting constituent waves
  parameterized by frequency, amplitude, and phase, enabling better handling of long-short-term
  dynamics and multi-periodicity patterns. The approach is architecture-agnostic and
  can boost mainstream TSF models including Informer, Autoformer, PatchTST, and iTransformer.
  The current snapshot preserves only metadata and metric contracts; executable code,
  launcher scripts, and README are absent. This entry is suitable for paper-backed
  planning and upstream restoration planning, but not for direct local execution until
  the upstream GitHub source (https://github.com/rakuyorain/Implicit-Forecaster) is
  rehydrated into the package.

  '
