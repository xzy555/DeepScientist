    DLinear, Transformer), loads data, trains, and evaluates.
- path: utils/metrics.py
  role: metric computation
  description: Implements MAE, MSE, RMSE, MAPE, MSPE, RSE, CORR metrics; metric()
    returns (mae, mse, rmse, mape, mspe, rse, corr).
