difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a time-series task that tests efficient recurrent forecasting
  rather than transformer scaling.
not_recommended_when: Do not use this if you specifically need a multimodal or very large language-model
  benchmark.
