name: Unlocking the Power of LSTM for Long Term Time Series Forecasting
version: 0.1.0
one_line: Optimize a patched sLSTM forecasting model for long-horizon public time-series benchmarks.
task_description: This packaged benchmark covers a patched sLSTM architecture for long-horizon public
  time-series benchmarks. The task is to tune patch structure and recurrent sequence modeling so that
  forecasting error drops across the supported datasets.
