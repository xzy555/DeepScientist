schema_version: 1
id: aisb.t3.005_tsae
name: 'Temporal Sparse Autoencoders: Leveraging the Sequential Nature of Language for Interpretability'
version: 0.1.0
one_line: Optimize temporal sparse autoencoders and SAEBench-style interpretability evaluation for language
  models.
task_description: This packaged benchmark covers temporal sparse autoencoders for language-model representations
  together with SAEBench-style interpretability evaluation. The task is to train sparse feature dictionaries
  over temporal activations, audit feature quality and sparsity behavior, and improve interpretability
  metrics on the benchmark route.
