task_description: This packaged benchmark covers subgroup-aware binary classifier evaluation under label
  shift, calibration mismatch, and asymmetric decision costs. The task is to evaluate binary systems more
  faithfully than aggregate metrics alone by exposing subgroup behavior, miscalibration, and cost-sensitive
  tradeoffs.
