notes:
- PIR 作为后处理插件运行，无需修改基础预测器
- 该框架同时处理长期和短期预测场景
- 与 Time-Series-Library 的集成确保了与标准基准测试协议的兼容性
- 静态代码审计确认所有分阶段指标的可执行锚点
- 打包过程中未执行基准测试；建议进行运行时验证
