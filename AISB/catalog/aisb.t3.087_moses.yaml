id: aisb.t3.087_moses
name: MoSES - Multi-Task Vehicle Routing Solver
version: 0.1.0
one_line: Multi-task vehicle-routing solver using LoRA-based specialized experts and
  adaptive gating under State-Decomposable MDP framework.
task_description: 'This packaged benchmark covers the Mixture-of-Specialized-Experts
  Solver (MoSES) for multi-task vehicle routing problems. The approach introduces
  a State-Decomposable MDP (SDMDP) that reformulates VRPs by expressing the state
  space as the Cartesian product of basis state spaces, each associated with a basis
  VRP variant. Basis policies are realized through specialized LoRA experts, each
  fine-tuned from a frozen pretrained backbone for a specific basis variant. A latent-space
  extension (LS-SDMDP) incorporates optimal basis policies and a learnable mixture
  function to enable policy reuse in the embedding space. The mixture function maps
  basis state embeddings generated by optimal basis policies to unified state embeddings
  via an adaptive gating mechanism. Under mild assumptions, LS-SDMDP provably recovers
  the optimal unified policy. The current local snapshot preserves benchmark metadata
  and paper artifacts but does not contain executable training or evaluation code;
  restoration of the runnable pipeline is required before benchmark execution.

  '
