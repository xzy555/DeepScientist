id: aisb.t3.080_latentscorereweight
name: Latent Score-Based Reweighting for Robust Classification on Imbalanced Tabular
  Data
version: 0.1.0
one_line: 'Score-based density reweighting for robust tabular classification under
  distribution shift, without requiring group labels.

  '
task_description: 'This packaged benchmark targets robust tabular classification by
  identifying and upweighting underrepresented regions of the joint data distribution
  P(X, Y) using latent score signals from a score-based (diffusion) model. Unlike
  boundary-based methods such as JTT that upweight misclassified samples near the
  decision boundary P(Y|X), this framework estimates local sample density via score-vector
  similarity with neighbouring data points, then reweights low-density regions to
  produce a more globally balanced training distribution. The method requires no group-label
  prior information. Evaluation targets worst-group accuracy and mean accuracy on
  tabular datasets under distribution shift. The current local snapshot does not preserve
  executable training or evaluation code; both primary metrics are blocked-no-code
  and the entry must be treated as restore-needed before any run is attempted.

  '
