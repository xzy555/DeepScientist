schema_version: 1
id: aisb.t3.034_ensemblewm
name: Ensemble Watermarks for Large Language Models
version: 0.1.0
one_line: Optimize multi-feature watermark detection that combines semantic and statistical signals for
  LLM outputs.
task_description: This packaged benchmark covers watermark detection for LLM outputs by combining semantic
  and statistical signals. The task is to detect watermarked generations more reliably than single-signal
  baselines while preserving robustness to paraphrase and output variation.
capability_tags:
- research_code_optimization
- large_language_models
- watermarking
- detection
- robustness
aisb_direction: T3
track_fit:
- paper_track
- benchmark_track
task_mode: evaluation_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: medium
time_band: 6-24h
difficulty: hard
data_access: public
recommended_when: Use this benchmark when you want an LLM-safeguard task focused on watermark detection
  quality rather than model finetuning.
not_recommended_when: Do not use this if you cannot host open LLM checkpoints or if you need a benchmark
  without generation and detection loops.
