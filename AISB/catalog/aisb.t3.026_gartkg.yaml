- benchmark_track
task_mode: experiment_driven
requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
snapshot_status: runnable_not_verified
support_level: advanced
cost_band: medium
time_band: 6-24h
difficulty: hard
data_access: public
