requires_execution: true
requires_paper: true
integrity_level: cas_plus_canary
cost_band: medium
time_band: 2-6h
difficulty: medium
data_access: public
recommended_when: Use this benchmark when you want a citation-quality metric task that evaluates full
  retrieval context instead of simple NLI proxies.
not_recommended_when: Do not use this if you need a benchmark without retrieval passages, source documents,
  or API-backed metric computation.
paper:
  title: 'CiteEval: Principle-Driven Citation Evaluation for Source Attribution'
  venue: arXiv preprint
