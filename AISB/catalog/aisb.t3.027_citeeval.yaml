schema_version: 1
id: aisb.t3.027_citeeval
name: 'CiteEval: Principle-Driven Citation Evaluation for Source Attribution'
version: 0.1.0
one_line: Optimize principle-driven citation evaluation over retrieval context, cited sources, and generated
  answers.
task_description: This packaged benchmark covers principle-driven citation evaluation over retrieved context,
  cited sources, and generated answers. The task is to judge whether citations are correct and well-supported,
  then improve citation-grounding metrics without rewarding superficial source overlap.
capability_tags:
- research_code_optimization
- citation_evaluation
